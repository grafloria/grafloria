<meta charset="utf-8">
<title>Execute flow (node statuses) — Grafloria</title>
<link rel="stylesheet" href="../shell/demo.css?v=drawer3">
<style>
  #bar, #bar2 { display: flex; gap: 8px; padding: 8px 24px; border-bottom: 1px solid rgba(127,127,127,.25); align-items: center; flex-wrap: wrap; }
  #bar button { padding: 5px 12px; border-radius: 6px; border: 1px solid rgba(127,127,127,.4); background: transparent; color: inherit; cursor: pointer; font: inherit; }
  #bar button:disabled { opacity: .5; cursor: default; }
  #readout { margin-left: auto; font: 12px/1.4 ui-monospace, monospace; opacity: .8; }
  #bar2 { padding-top: 6px; padding-bottom: 6px; }
  #bar2 label { display: inline-flex; gap: 5px; align-items: center; font: 12px/1.6 inherit; opacity: .9; }
  #bar2 select { font: inherit; color: inherit; background: transparent; border: 1px solid rgba(127,127,127,.4); border-radius: 5px; padding: 2px 4px; }
  #bar2 .sep { width: 1px; align-self: stretch; background: rgba(127,127,127,.3); margin: 0 4px; }
  #canvas { height: calc(100vh - 196px); }
</style>
<header id="demo-head"></header>
<div id="bar">
  <button id="btn-run">▶ execute flow</button>
  <button id="btn-fail">execute with a failure</button>
  <button id="btn-warn">execute with a warning</button>
  <button id="btn-pause" disabled>⏸ pause</button>
  <button id="btn-step">step ▸</button>
  <button id="btn-reset">reset</button>
  <span id="readout">idle</span>
</div>
<div id="bar2">
  <label>wire
    <select id="sel-type">
      <option value="marching-ants" selected>marching ants</option>
      <option value="flow">flow</option>
      <option value="pulse">pulse</option>
      <option value="dash-flow">dash flow</option>
    </select>
  </label>
  <label>speed
    <select id="sel-speed">
      <option value="slow">slow</option>
      <option value="normal">normal</option>
      <option value="fast" selected>fast</option>
    </select>
  </label>
  <label>direction
    <select id="sel-dir">
      <option value="forward" selected>forward</option>
      <option value="reverse">reverse</option>
    </select>
  </label>
  <span class="sep"></span>
  <label><input type="checkbox" id="chk-pulse" checked> pulse the running node</label>
  <label><input type="checkbox" id="chk-rm"> reduced motion (statics only)</label>
</div>
<div id="canvas"></div>
<script type="module">
import { render } from '../shell/grafloria.js';
import { defineDemo, check } from '../shell/demo.js?v=drawer3';

// n8n-style flow execution over the SHIPPED status machinery: every node
// carries `state.status` ('idle' | 'pending' | 'running' | 'completed' |
// 'error' | 'warning') and `state.animateStatus`; the renderer turns them into
// `node-status-*` classes with a pulsing highlight for 'running'. The feature
// was fully built and had ZERO reachability proof — and its 'running' pulse
// had never actually animated: the keyframes were named "running", which the
// CSS `animation` shorthand parses as the reserved play-state keyword, so the
// animation-name computed to `none` everywhere. This page is the proof it
// works now, driven the way a workflow runner would drive it.
//
// The page now exercises the WHOLE wired option surface, not just the happy
// path: all four edge animation types (`style.animation.type`: marching-ants /
// flow / pulse / dash-flow) with `speed` (slow|normal|fast → link-speed-*) and
// `direction` ('reverse' → link-direction-reverse); the non-fatal 'warning'
// outcome; the per-node motion opt-out (`animateStatus: false` →
// node-status-still, statics stay); a step-through runner; and the app-level
// reduced-motion switch (animations.updateConfig({ reducedMotion }) →
// body.reduced-motion — the wave-6 dead-config fix), under which every static
// affordance must survive with every animation stilled.
const SPEC = {
  nodes: [
    { id: 'trigger',   position: { x: 60,  y: 180 }, size: { width: 130, height: 54 }, label: 'Trigger' },
    { id: 'fetch',     position: { x: 260, y: 180 }, size: { width: 130, height: 54 }, label: 'Fetch data' },
    { id: 'transform', position: { x: 460, y: 180 }, size: { width: 130, height: 54 }, label: 'Transform' },
    { id: 'validate',  position: { x: 660, y: 100 }, size: { width: 130, height: 54 }, label: 'Validate' },
    { id: 'enrich',    position: { x: 660, y: 260 }, size: { width: 130, height: 54 }, label: 'Enrich' },
    { id: 'save',      position: { x: 860, y: 180 }, size: { width: 130, height: 54 }, label: 'Save' },
    { id: 'notify',    position: { x: 1060, y: 180 }, size: { width: 130, height: 54 }, label: 'Notify' },
  ],
  edges: [
    { id: 'e1', source: 'trigger',   target: 'fetch' },
    { id: 'e2', source: 'fetch',     target: 'transform' },
    { id: 'e3', source: 'transform', target: 'validate' },
    { id: 'e4', source: 'transform', target: 'enrich' },
    { id: 'e5', source: 'validate',  target: 'save' },
    { id: 'e6', source: 'enrich',    target: 'save' },
    { id: 'e7', source: 'save',      target: 'notify' },
  ],
};

/** Execution order: a topological wave walk (parents before children). */
const ORDER = ['trigger', 'fetch', 'transform', 'validate', 'enrich', 'save', 'notify'];

defineDemo({
  name: 'Execute flow (node statuses)',
  blurb: 'Run the workflow like n8n: nodes pulse while running, the active wire animates in your chosen style (marching ants / flow / pulse / dash flow, any speed, either direction), a failure halts the run, a warning does not, a live run can be paused, stepped while paused, and continued — and every status keeps a static affordance under reduced motion. All node.state.status + link style.animation machinery.',
  howTo: [
    'Click "▶ execute flow": the run sweeps left to right — each node pulses blue while running, its incoming wire animates in the selected style, then it settles as completed; the readout tracks every step.',
    'Change the "wire" / "speed" / "direction" selectors — mid-run, if you like: the ACTIVE wire restyles live (marching ants → flow → pulse → dash flow; slow / normal / fast cycles; reverse marches the dashes backwards).',
    'Click "execute with a failure": the run halts at Transform — it shakes and holds the red error state, and everything downstream stays pending (dimmed), exactly like a failed n8n run.',
    'Click "execute with a warning": Enrich finishes amber (status \'warning\') but the flow KEEPS GOING — a warning is a non-fatal outcome, not a halt.',
    'Click "step ▸" repeatedly to advance the run one node per click — same statuses, host-paced instead of timer-paced.',
    'Mid-run, click "⏸ pause": the run FREEZES on the current node (it keeps pulsing — it is still running). "step ▸" now advances exactly one node per click while staying paused; "▶ continue" resumes the timer pace; "reset" aborts the paused run outright.',
    'Untick "pulse the running node" (animateStatus: false): the running node holds a STILL blue highlight — the status paints, only the motion opts out.',
    'Tick "reduced motion (statics only)": the app-level reduced-motion switch stills every animation, and every static affordance — colored strokes, dimmed pending — survives.',
    'Edit the graph and run again: select a wire (or node) and press Delete — the executor drives whatever still exists, so the run survives; a deleted wire simply does not animate. ⌘Z / Ctrl+Z brings it back.',
    'Read the wiring: the page only calls setState({ status, animateStatus }) per node and link.updateStyle({ animation: { type, speed, direction } }) per wire — the classes, colours and pulses are the shipped renderer machinery.',
  ],

  async setup(ctx) {
    const api = render(SPEC, ctx.host);
    ctx.instance = api;
    ctx.diagram = api.getModel();
    // This page ASSERTS running animations — battery saver off (see
    // animating-edges; an unplugged laptop under 20% would kill the pulse).
    api.animations.updateConfig({ respectBatteryStatus: false, batterySavingMode: false });
    // Fit the whole pipeline into whatever width is LEFT once the gallery
    // chrome (nav drawer + how-to panel) has reserved its space: for a real
    // visitor the canvas is ~900px and Notify sat beyond the right edge, so
    // the renderer culled it — and its status classes had no element to land
    // on (the ?run=1 checks went red on exactly that).
    api.fitView(40);

    const readout = document.getElementById('readout');
    const selType = document.getElementById('sel-type');
    const selSpeed = document.getElementById('sel-speed');
    const selDir = document.getElementById('sel-dir');
    const chkPulse = document.getElementById('chk-pulse');
    const chkRm = document.getElementById('chk-rm');
    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

    /** The wire style, straight off the controls. This is the REAL channel:
     *  style.animation {type, speed, direction} — the legacy-looking
     *  {animated, animationType} flags are consumed by nothing (this page
     *  shipped with them once and its marching ants never rendered; caught in
     *  the deep audit of this feature). */
    ctx.wireAnim = () => ({ type: selType.value, speed: selSpeed.value, direction: selDir.value });

    /** Wires currently carrying a run — so the selectors can restyle them live. */
    ctx.activeEdges = new Set();

    // NULL-SAFE against live editing: this is a real diagram — a visitor can
    // select a wire (or a node) and press Delete. The executor drives whatever
    // is STILL THERE; a missing wire simply doesn't animate, a missing node is
    // skipped. (Live report: "i deleted one line then suddenly i can't execute
    // any more" — the old direct .updateStyle threw on the deleted wire inside
    // reset(), which killed every run before it began.)
    ctx.setStatus = (id, status) => {
      const n = ctx.diagram.getNode(id);
      if (n) n.setState({ status, animateStatus: chkPulse.checked });
    };
    ctx.setEdgeActive = (id, active) => {
      const l = ctx.diagram.getLink(id);
      if (!l) {
        ctx.activeEdges.delete(id);
        return;
      }
      if (active) {
        ctx.activeEdges.add(id);
        l.updateStyle({ animation: ctx.wireAnim() });
      } else {
        ctx.activeEdges.delete(id);
        l.updateStyle({ animation: { type: 'none' } });
      }
    };
    /** The walk order, restricted to nodes that still exist. */
    ctx.aliveOrder = () => ORDER.filter((id) => ctx.diagram.getNode(id));

    /** One node begins: its incoming wires light up, it goes running. */
    const beginNode = (id) => {
      for (const e of SPEC.edges) if (e.target === id) ctx.setEdgeActive(e.id, true);
      ctx.setStatus(id, 'running');
    };
    /** One node ends (completed | warning | error): wires quiet down. */
    const endNode = (id, status) => {
      for (const e of SPEC.edges) if (e.target === id) ctx.setEdgeActive(e.id, false);
      ctx.setStatus(id, status);
    };

    ctx.stepIndex = -1; // -1 = not stepping
    ctx.runActive = false; // an auto-run (execute) is in flight
    ctx.paused = false;
    ctx.runToken = 0; // bumped by reset — a stale run sees it and aborts
    let pauseWaiters = []; // resolvers parked at the gate while paused
    const pauseBtn = document.getElementById('btn-pause');
    const stepBtn = document.getElementById('btn-step');
    const syncPauseBtn = () => {
      pauseBtn.disabled = !ctx.runActive;
      pauseBtn.textContent = ctx.paused ? '▶ continue' : '⏸ pause';
      // step ▸ is live exactly when it DOES something: standalone stepping
      // (no run) or advancing a PAUSED run. Enabled-but-inert is how buttons
      // read as broken (and how DEAD-BUTTON reads them too).
      stepBtn.disabled = ctx.runActive && !ctx.paused;
    };
    let pendingSteps = 0; // step ▸ clicks banked before the executor parks
    let wakeSleep = null; // aborts the gate's CURRENT timer (step ▸ / reset)
    const gateSleep = (ms) => new Promise((res) => {
      const t = setTimeout(() => { wakeSleep = null; res(); }, ms);
      wakeSleep = () => { clearTimeout(t); wakeSleep = null; res(); };
    });
    const pokeGate = () => { if (wakeSleep) wakeSleep(); };
    /** Release ONE parked step (step ▸ while paused) or ALL (continue/reset). */
    const releaseGate = (all) => {
      if (all) {
        pendingSteps = 0;
        for (const res of pauseWaiters.splice(0)) res();
        return;
      }
      const parked = pauseWaiters.splice(0, 1);
      if (parked.length) parked[0]();
      // Not parked yet — the held node's timer is still ticking. Bank the
      // click AND abort the timer: a step must respond NOW, not up to a full
      // step interval later (a step that lands late reads as a dead button —
      // literally: DEAD-BUTTON caught the delayed version).
      else {
        pendingSteps += 1;
        pokeGate();
      }
    };
    /**
     * The between-nodes gate: timer-paced normally; parked while paused. A
     * pause lands BEFORE the current node completes, so the picture freezes
     * with that node still running (it IS still running — n8n semantics).
     */
    const stepGate = async (stepMs) => {
      if (!ctx.paused) await gateSleep(stepMs);
      if (!ctx.paused) return; // normal pace (or continue beat the timer)
      if (pendingSteps > 0) { pendingSteps -= 1; return; } // step ▸ — advance one
      await new Promise((res) => pauseWaiters.push(res)); // parked: step/continue/reset
    };
    ctx.setPaused = (on) => {
      if (!ctx.runActive) return;
      ctx.paused = on;
      syncPauseBtn();
      const held = ORDER.find((id) => ctx.diagram.getNode(id).state.status === 'running');
      if (on) readout.textContent = `paused at: ${held ?? '—'} — ▶ continue or step ▸`;
      else {
        if (held) readout.textContent = `running: ${held}`;
        releaseGate(true);
      }
    };

    ctx.reset = () => {
      ctx.runToken += 1; // any in-flight run aborts at its next gate
      ctx.paused = false;
      ctx.runActive = false;
      syncPauseBtn();
      releaseGate(true); // let a parked run wake up and see the stale token
      pokeGate(); // and a SLEEPING one — reset must abort now, not next tick
      ctx.stepIndex = -1;
      for (const id of ORDER) ctx.setStatus(id, 'idle');
      for (const e of SPEC.edges) ctx.setEdgeActive(e.id, false);
      api.renderNow();
      readout.textContent = 'idle';
    };

    /**
     * The executor — the ONLY thing a real workflow host adds. Walks the
     * graph, drives per-node status + the incoming edge's animation.
     * `failAt` halts the run n8n-style; `warnAt` finishes that node amber and
     * KEEPS GOING (a warning is an outcome, not a halt); `stepMs` lets the
     * assert run at 0ms.
     */
    ctx.execute = async ({ failAt = null, warnAt = null, stepMs = 550 } = {}) => {
      ctx.reset();
      const token = ctx.runToken; // reset() just bumped it; this run owns it
      ctx.runActive = true;
      syncPauseBtn();
      try {
      const walk = ctx.aliveOrder();
      for (const id of walk) ctx.setStatus(id, 'pending');
      api.renderNow();

      let warned = null;
      for (const id of walk) {
        beginNode(id);
        readout.textContent = ctx.paused ? `paused at: ${id} — ▶ continue or step ▸` : `running: ${id}`;
        api.renderNow();
        await stepGate(stepMs);
        // reset() (or a newer run) invalidated this one while it slept/parked:
        // stop dead — the world belongs to someone else now.
        if (token !== ctx.runToken) return { completed: [], failed: null, warned: null, aborted: true };
        if (ctx.paused) readout.textContent = `paused at: ${id} — ▶ continue or step ▸`;

        if (failAt === id) {
          endNode(id, 'error');
          readout.textContent = `failed at: ${id} — downstream never ran`;
          api.renderNow();
          return { completed: walk.slice(0, walk.indexOf(id)), failed: id, warned };
        }
        if (warnAt === id) {
          warned = id;
          endNode(id, 'warning');
          readout.textContent = `warning at: ${id} — flow continues`;
        } else {
          endNode(id, 'completed');
        }
        api.renderNow();
      }
      readout.textContent = warned ? `flow completed with a warning at ${warned} ⚠` : 'flow completed ✓';
      return { completed: walk.filter((id) => id !== warned), failed: null, warned };
      } finally {
        // Clean up only if this run still OWNS the world — an aborted run's
        // finally must not clobber the state of the newer run (or the reset)
        // that displaced it.
        if (token === ctx.runToken) {
          ctx.runActive = false;
          ctx.paused = false;
          syncPauseBtn();
        }
      }
    };

    /** Step-through: the same walk, advanced one node per click. */
    ctx.step = () => {
      const walk = ctx.aliveOrder();
      if (!walk.length) return;
      if (ctx.stepIndex < 0) {
        ctx.reset();
        for (const id of walk) ctx.setStatus(id, 'pending');
        ctx.stepIndex = 0;
        beginNode(walk[0]);
        readout.textContent = `step 1/${walk.length}: running ${walk[0]}`;
      } else {
        endNode(walk[Math.min(ctx.stepIndex, walk.length - 1)], 'completed');
        ctx.stepIndex += 1;
        if (ctx.stepIndex < walk.length) {
          beginNode(walk[ctx.stepIndex]);
          readout.textContent = `step ${ctx.stepIndex + 1}/${walk.length}: running ${walk[ctx.stepIndex]}`;
        } else {
          ctx.stepIndex = -1;
          readout.textContent = 'flow completed ✓';
        }
      }
      api.renderNow();
    };

    // The selectors restyle any wire that is CURRENTLY active, live.
    const applyWire = () => {
      for (const id of ctx.activeEdges) ctx.diagram.getLink(id)?.updateStyle({ animation: ctx.wireAnim() });
      if (ctx.activeEdges.size) api.renderNow();
    };
    selType.addEventListener('change', applyWire);
    selSpeed.addEventListener('change', applyWire);
    selDir.addEventListener('change', applyWire);

    // animateStatus opt-out, applied to every node that currently shows a status.
    chkPulse.addEventListener('change', () => {
      for (const id of ctx.aliveOrder()) {
        const n = ctx.diagram.getNode(id);
        if (n.state.status && n.state.status !== 'idle') n.setState({ animateStatus: chkPulse.checked });
      }
      api.renderNow();
    });

    // The APP's reduced-motion switch (not the OS one): AnimationService toggles
    // body.reduced-motion and the injected motion-preference sheet stills every
    // animation — while the status classes keep painting their statics.
    chkRm.addEventListener('change', () => {
      api.animations.updateConfig({ reducedMotion: chkRm.checked });
    });

    // Only the LAUNCHERS lock during a run — pause/continue, step-while-paused
    // and reset are precisely the buttons a live run needs.
    const launchers = ['btn-run', 'btn-fail', 'btn-warn'].map((id) => document.getElementById(id));
    const busy = async (fn) => {
      launchers.forEach((b) => (b.disabled = true));
      try { await fn(); } finally { launchers.forEach((b) => (b.disabled = false)); }
    };
    document.getElementById('btn-run').addEventListener('click', () => busy(() => ctx.execute()));
    document.getElementById('btn-fail').addEventListener('click', () => busy(() => ctx.execute({ failAt: 'transform' })));
    document.getElementById('btn-warn').addEventListener('click', () => busy(() => ctx.execute({ warnAt: 'enrich' })));
    pauseBtn.addEventListener('click', () => ctx.setPaused(!ctx.paused));
    stepBtn.addEventListener('click', () => {
      // Paused auto-run: advance exactly one node, stay paused. Standalone
      // step-through otherwise (the button is disabled during an unpaused
      // run — two pacemakers on one heart is how demos die).
      if (ctx.runActive && ctx.paused) releaseGate(false);
      else if (!ctx.runActive) ctx.step();
    });
    document.getElementById('btn-reset').addEventListener('click', () => ctx.reset());

    await ctx.tick();
  },

  // Money shot: the run held mid-flight with the full affordance palette —
  // Trigger completed (green), Fetch completed-with-warning (amber), Transform
  // pulsing blue with its wire animating, everything downstream dimmed pending.
  async showcase(ctx) {
    ctx.reset();
    for (const id of ORDER) ctx.setStatus(id, 'pending');
    ctx.setStatus('trigger', 'completed');
    ctx.setStatus('fetch', 'warning');
    ctx.setStatus('transform', 'running');
    ctx.setEdgeActive('e2', true);
    ctx.instance.renderNow();
  },

  async assert(ctx) {
    const m = ctx.diagram;
    const statusClass = (id) => {
      const el = ctx.host.querySelector(`[data-node-id="${id}"] .diagram-node`);
      return el ? (el.getAttribute('class') || '') : '';
    };
    const nodeEl = (id) => ctx.host.querySelector(`[data-node-id="${id}"] .diagram-node`);
    const wireEl = (id) => ctx.host.querySelector(`[data-link-id="${id}"] .diagram-link`);
    const setSel = (id, v) => {
      const el = document.getElementById(id);
      el.value = v;
      el.dispatchEvent(new Event('change'));
    };
    const setChk = (id, on) => {
      const el = document.getElementById(id);
      el.checked = on;
      el.dispatchEvent(new Event('change'));
    };

    // Can this environment animate AT ALL? The screenshot rig freezes every
    // animation (`* { animation: none !important }`) to make pixels
    // deterministic — under it, every "must animate" check is unsatisfiable
    // and its throw used to LEAK the assert's live run into the after-frame
    // (the golden was literally a photo of the leak). Positive-motion checks
    // gate on this probe; classes, statics and model behavior stay
    // unconditional, and the gallery gate (no freeze) enforces everything.
    const motionAllowed = (() => {
      const probe = document.createElement('div');
      probe.style.cssText = 'position:absolute;width:1px;height:1px;animation: status-node-running 1s linear infinite;';
      document.body.appendChild(probe);
      const name = getComputedStyle(probe).animationName;
      probe.remove();
      return name !== 'none';
    })();

    // Boot-state controls (the checks assume them; ?run=1 reloads fresh, but a
    // gate re-run inside one page must not inherit a twiddled panel).
    setSel('sel-type', 'marching-ants');
    setSel('sel-speed', 'fast');
    setSel('sel-dir', 'forward');
    setChk('chk-pulse', true);
    setChk('chk-rm', false);

    // 1. Mid-run: exactly one node is RUNNING, painted with a live pulse.
    const run = ctx.execute({ stepMs: 40 });
    await new Promise((r) => setTimeout(r, 60)); // inside step 2 (fetch running)
    const runningNow = ORDER.filter((id) => m.getNode(id).state.status === 'running');
    check(runningNow.length === 1, `exactly one node should be running mid-flow, got [${runningNow}]`);
    const cls = statusClass(runningNow[0]);
    check(cls.includes('node-status-running'), `the running node must carry the status class, got "${cls}"`);
    // The ACTIVE incoming edge animates as marching ants — through the real
    // style.animation shape (the dead {animated} flags painted nothing).
    const activeEdges = [...ctx.host.querySelectorAll('.link-animated-marching-ants')];
    check(activeEdges.length >= 1, 'the running node\'s incoming edge must carry the marching-ants class mid-run');
    const el = ctx.host.querySelector(`[data-node-id="${runningNow[0]}"] .diagram-node`);
    if (motionAllowed) {
      const anim = getComputedStyle(el).animationName;
      check(anim !== 'none', 'the running status must ANIMATE (the "running" keyframes were reserved-word-dead for every SVG node until this page existed)');
    }

    // 2. The happy path completes every node, in order.
    const result = await run;
    check(result.failed === null, 'the happy path must not fail');
    check(result.completed.length === ORDER.length, `all ${ORDER.length} nodes should complete, got ${result.completed.length}`);
    for (const id of ORDER) {
      check(m.getNode(id).state.status === 'completed', `${id} should be completed, is ${m.getNode(id).state.status}`);
      check(statusClass(id).includes('node-status-completed'), `${id} should carry the completed class`);
    }

    // 3. A failure HALTS the flow: the failed node holds error, downstream stays pending.
    const failed = await ctx.execute({ failAt: 'transform', stepMs: 0 });
    check(failed.failed === 'transform', 'the run should fail at transform');
    check(m.getNode('transform').state.status === 'error', 'transform should hold the error status');
    check(statusClass('transform').includes('node-status-error'), 'transform should carry the error class');
    for (const id of ['validate', 'enrich', 'save', 'notify']) {
      check(m.getNode(id).state.status === 'pending', `${id} is downstream of the failure and must stay pending, is ${m.getNode(id).state.status}`);
    }

    // 3b. Statuses paint STATIC affordances (visible under reduced motion,
    //     battery saver, and in frozen captures) — not animation alone.
    const errStroke = getComputedStyle(ctx.host.querySelector('[data-node-id="transform"] .diagram-node')).stroke;
    check(errStroke === 'rgb(239, 68, 68)', `the error status must paint a static red stroke, got ${errStroke}`);
    const pendingOpacity = getComputedStyle(ctx.host.querySelector('[data-node-id="save"] .diagram-node')).opacity;
    check(Number(pendingOpacity) < 0.9, `pending nodes must read dimmed without animation, opacity ${pendingOpacity}`);

    // 4. A WARNING does NOT halt the flow (n8n: succeeded-with-warnings) — it
    //    paints a static amber stroke and downstream still runs to completion.
    const warnRun = await ctx.execute({ warnAt: 'enrich', stepMs: 0 });
    check(warnRun.warned === 'enrich', `the warn run should report enrich, got ${warnRun.warned}`);
    check(warnRun.failed === null, 'a warning is an outcome, not a failure');
    check(m.getNode('enrich').state.status === 'warning', `enrich should hold the warning status, is ${m.getNode('enrich').state.status}`);
    check(statusClass('enrich').includes('node-status-warning'), `enrich should carry the warning class, got "${statusClass('enrich')}"`);
    const warnStroke = getComputedStyle(nodeEl('enrich')).stroke;
    check(warnStroke === 'rgb(245, 158, 11)', `the warning status must paint a static amber stroke, got ${warnStroke}`);
    for (const id of ['save', 'notify']) {
      check(m.getNode(id).state.status === 'completed', `${id} is downstream of a WARNING and must still complete, is ${m.getNode(id).state.status}`);
    }

    // 5. The wire selectors drive the active wire's PAINTED animation through
    //    style.animation: class, keyframes and the static dash pattern all flip.
    ctx.reset();
    ctx.setStatus('transform', 'running');
    ctx.setEdgeActive('e2', true);
    ctx.instance.renderNow();
    const wireTable = [
      ['marching-ants', 'marching-ants', '5px, 5px'],
      ['flow',          'flow',          '10px, 5px'],
      ['pulse',         'pulse-edge',    'none'],
      ['dash-flow',     'dash-flow',     '8px, 12px'],
    ];
    for (const [type, keyframes, dash] of wireTable) {
      setSel('sel-type', type);
      const wcls = wireEl('e2').getAttribute('class') || '';
      const wcs = getComputedStyle(wireEl('e2'));
      check(wcls.includes(`link-animated-${type}`), `wire type ${type}: the active wire must carry link-animated-${type}, got "${wcls}"`);
      if (motionAllowed) check(wcs.animationName === keyframes, `wire type ${type} must run the "${keyframes}" keyframes, got ${wcs.animationName}`);
      check(wcs.strokeDasharray === dash, `wire type ${type} must paint its static dash pattern (${dash}), got ${wcs.strokeDasharray}`);
    }
    // Speeds are painted cycle times, not config: slow 3s / normal 1s / fast 0.5s.
    setSel('sel-type', 'marching-ants');
    for (const [speed, dur, hasClass] of [['slow', '3s', true], ['normal', '1s', false], ['fast', '0.5s', true]]) {
      setSel('sel-speed', speed);
      const wcls = wireEl('e2').getAttribute('class') || '';
      check(wcls.includes(`link-speed-${speed}`) === hasClass,
        `speed ${speed}: link-speed-${speed} ${hasClass ? 'must' : 'must NOT (normal emits no class)'} be on the wire, got "${wcls}"`);
      if (motionAllowed) {
        const d = getComputedStyle(wireEl('e2')).animationDuration;
        check(d === dur, `speed ${speed} must compute a ${dur} animation cycle, got ${d}`);
      }
    }
    // Direction reverses the march itself (computed animation-direction).
    setSel('sel-dir', 'reverse');
    check((wireEl('e2').getAttribute('class') || '').includes('link-direction-reverse'), 'direction reverse must add link-direction-reverse');
    if (motionAllowed) check(getComputedStyle(wireEl('e2')).animationDirection === 'reverse', 'direction reverse must COMPUTE animation-direction: reverse');
    setSel('sel-dir', 'forward');
    if (motionAllowed) check(getComputedStyle(wireEl('e2')).animationDirection === 'normal', 'direction forward must compute animation-direction: normal');
    setSel('sel-speed', 'fast');

    // 6. animateStatus opt-out: the status keeps painting, only the motion stops.
    setChk('chk-pulse', false);
    check(statusClass('transform').includes('node-status-still'), `animateStatus:false must add node-status-still, got "${statusClass('transform')}"`);
    check(statusClass('transform').includes('node-status-running'), 'the status class must SURVIVE the motion opt-out');
    check(getComputedStyle(nodeEl('transform')).animationName === 'none', 'node-status-still must compute animation: none');
    check(getComputedStyle(nodeEl('transform')).stroke === 'rgb(52, 152, 219)', 'the still running node must keep its static blue stroke');
    setChk('chk-pulse', true);
    if (motionAllowed) check(getComputedStyle(nodeEl('transform')).animationName !== 'none', 're-ticking the box must bring the running pulse back');
    check(!statusClass('transform').includes('node-status-still'), 'node-status-still must drop when the motion opt-out clears');

    // 7. Step-through: one node per click of the real button.
    ctx.reset();
    const stepBtn = document.getElementById('btn-step');
    const readoutEl = document.getElementById('readout');
    stepBtn.click();
    check(m.getNode('trigger').state.status === 'running', 'step 1 must set trigger running');
    check(statusClass('trigger').includes('node-status-running'), 'step 1: trigger must carry the running class');
    check(ORDER.filter((id) => m.getNode(id).state.status === 'running').length === 1, 'step mode must keep exactly one node running');
    check(readoutEl.textContent === `step 1/${ORDER.length}: running trigger`, `the readout must announce the step, got "${readoutEl.textContent}"`);
    stepBtn.click();
    check(m.getNode('trigger').state.status === 'completed', 'step 2 must complete trigger');
    check(m.getNode('fetch').state.status === 'running', 'step 2 must set fetch running');
    check((wireEl('e1').getAttribute('class') || '').includes('link-animated-'), `step 2: fetch's incoming wire must animate, got "${wireEl('e1').getAttribute('class')}"`);
    for (let i = 0; i < ORDER.length - 1; i++) stepBtn.click();
    for (const id of ORDER) {
      check(m.getNode(id).state.status === 'completed', `${id} should be completed after stepping through, is ${m.getNode(id).state.status}`);
    }
    check(readoutEl.textContent === 'flow completed ✓', `stepping to the end must finish the flow, readout "${readoutEl.textContent}"`);

    // 7b. PAUSE freezes a live run on the current node; step ▸ advances exactly
    //     one node while staying paused; ▶ continue finishes the flow.
    //     Entry points are STATE-based, not wall-clock — under gate/shoot load
    //     timers stretch and a "wait 110ms" lands anywhere (a flaked check here
    //     leaves the page mid-run, which the after-frame then photographs).
    const until = async (cond, what) => {
      for (let i = 0; i < 400 && !cond(); i++) await new Promise((r) => setTimeout(r, 10));
      check(cond(), `timed out waiting for ${what}`);
    };
    const pauseBtn = document.getElementById('btn-pause');
    check(pauseBtn.disabled, 'the pause button must be disabled while no run is active');
    // Generous step interval: the pause must land while the run is LIVE even
    // when a loaded gate stretches every timer. And the whole section reaps
    // its run in `finally` — a failed check must never leave an un-awaited
    // executor alive behind the assert (the screenshot rig photographs
    // whatever the page is doing after run() resolves).
    const pausedRun = ctx.execute({ stepMs: 400 });
    try {
    await until(() => m.getNode('trigger').state.status === 'completed', 'the run to pass its first node');
    check(!pauseBtn.disabled, 'the pause button must arm while a run is active');
    pauseBtn.click();
    check(ctx.paused === true, 'clicking pause must pause the run');
    check(pauseBtn.textContent === '▶ continue', `the pause button must flip to continue, got "${pauseBtn.textContent}"`);
    await new Promise((r) => setTimeout(r, 240)); // > 3 step intervals
    const frozenRunning = ORDER.filter((id) => m.getNode(id).state.status === 'running');
    check(frozenRunning.length === 1, `a paused run must hold exactly one running node, got [${frozenRunning}]`);
    const frozenAt = frozenRunning[0];
    const doneBefore = ORDER.filter((id) => m.getNode(id).state.status === 'completed').length;
    await new Promise((r) => setTimeout(r, 160));
    check(m.getNode(frozenAt).state.status === 'running', 'the paused run must NOT advance past the held node');
    check(ORDER.filter((id) => m.getNode(id).state.status === 'completed').length === doneBefore,
      'no node may complete while the run is paused');
    check(document.getElementById('readout').textContent.includes('paused at'), 'the readout must announce the pause');
    // step ▸ while paused: exactly one node advances, the run STAYS paused.
    document.getElementById('btn-step').click();
    await until(() => m.getNode(frozenAt).state.status === 'completed', 'step-while-paused to complete the held node');
    const nextIdx = ORDER.indexOf(frozenAt) + 1;
    check(m.getNode(ORDER[nextIdx]).state.status === 'running', `step-while-paused must set ${ORDER[nextIdx]} running`);
    check(ctx.paused === true, 'stepping must not unpause the run');
    await new Promise((r) => setTimeout(r, 160));
    check(m.getNode(ORDER[nextIdx]).state.status === 'running', 'after the single step the run must hold again');
    // ▶ continue: the rest of the flow completes at timer pace.
    pauseBtn.click();
    check(ctx.paused === false, 'continue must unpause');
    const pausedResult = await pausedRun;
    check(pausedResult.failed === null && !pausedResult.aborted, 'the continued run must finish normally');
    for (const id of ORDER) {
      check(m.getNode(id).state.status === 'completed', `${id} must be completed after continue, is ${m.getNode(id).state.status}`);
    }
    check(pauseBtn.disabled && pauseBtn.textContent === '⏸ pause', 'the pause button must disarm after the run ends');
    } finally {
      ctx.reset(); // aborts the run if a check above threw mid-flight…
      await pausedRun.catch(() => {}); // …and REAPS it: nothing may outlive the assert
    }

    // 7c. RESET aborts a paused run outright — nothing resumes behind its back.
    const abortRun = ctx.execute({ stepMs: 400 });
    try {
    await until(() => m.getNode('trigger').state.status === 'completed', 'the abort-test run to pass its first node');
    pauseBtn.click();
    check(ctx.paused === true, 'setup: the abort-test run must be paused');
    document.getElementById('btn-reset').click();
    const aborted = await abortRun;
    check(aborted.aborted === true, 'reset must ABORT the paused run (its promise reports aborted)');
    await new Promise((r) => setTimeout(r, 200));
    for (const id of ORDER) {
      check(m.getNode(id).state.status === 'idle', `${id} must stay idle after the abort — the dead run must not resume, is ${m.getNode(id).state.status}`);
    }
    check(pauseBtn.disabled, 'the pause button must disarm after the abort');
    } finally {
      ctx.reset();
      await abortRun.catch(() => {});
    }

    // 8. The app's reduced-motion switch: every animation stills, every static
    //    affordance survives. (body.reduced-motion — the JS-driven channel that
    //    was dead config until the wave-6 fix injected its stylesheet.)
    ctx.reset();
    ctx.setStatus('transform', 'running');
    ctx.setEdgeActive('e2', true);
    ctx.instance.renderNow();
    setChk('chk-rm', true);
    check(document.body.classList.contains('reduced-motion'), 'the checkbox must set body.reduced-motion via animations.updateConfig');
    check(getComputedStyle(nodeEl('transform')).animationName === 'none', 'reduced motion must still the running pulse');
    check(getComputedStyle(nodeEl('transform')).stroke === 'rgb(52, 152, 219)', 'reduced motion must NOT strip the static blue running stroke');
    check(statusClass('transform').includes('node-status-running'), 'reduced motion must not withhold the status class (statics ride on it)');
    check(getComputedStyle(wireEl('e2')).animationName === 'none', 'reduced motion must still the wire animation');
    setChk('chk-rm', false);
    check(!document.body.classList.contains('reduced-motion'), 'unticking must clear body.reduced-motion');
    if (motionAllowed) check(getComputedStyle(nodeEl('transform')).animationName !== 'none', 'motion must come back when the switch clears');

    // 8b. LIVE EDITING must not kill the runner (live report: "i deleted one
    //     line then suddenly i can't execute any more" — the executor threw on
    //     the deleted wire inside reset(), before any run could begin).
    const savedWire = m.getLink('e3');
    m.removeLink('e3');
    const wireless = await ctx.execute({ stepMs: 0 });
    check(wireless.failed === null, 'a run with a deleted wire must still complete');
    check(wireless.completed.length === ORDER.length, `all ${ORDER.length} nodes must complete without the e3 wire, got ${wireless.completed.length}`);
    m.addLink(savedWire);
    check(!!m.getLink('e3'), 'restore: e3 back in the model');
    // A deleted NODE is skipped, not fatal: capture it AND the links its
    // removal cascades, run, then put everything back.
    const savedNode = m.getNode('validate');
    const cascaded = ['e3', 'e5'].map((id) => m.getLink(id));
    m.removeNode('validate');
    const nodeless = await ctx.execute({ stepMs: 0 });
    check(nodeless.failed === null, 'a run with a deleted node must still complete');
    check(nodeless.completed.length === ORDER.length - 1, `the walk must skip the deleted node (${ORDER.length - 1} nodes), got ${nodeless.completed.length}`);
    check(!nodeless.completed.includes('validate'), 'the deleted node must not appear in the walk');
    m.addNode(savedNode);
    for (const l of cascaded) if (l && !m.getLink(l.id)) m.addLink(l);
    ctx.instance.renderNow();
    check(!!m.getNode('validate') && !!m.getLink('e3') && !!m.getLink('e5'), 'restore: validate + its wires back in the model');
    const afterRestore = await ctx.execute({ stepMs: 0 });
    check(afterRestore.completed.length === ORDER.length, 'the restored graph must run the FULL walk again');

    // 9. Reset clears every status back to idle.
    ctx.reset();
    for (const id of ORDER) {
      check(m.getNode(id).state.status === 'idle', `${id} should be idle after reset`);
      check(!/node-status-/.test(statusClass(id)), `${id} should carry no status class after reset`);
    }
  },
});
</script>
