<meta charset="utf-8">
<title>Node resizer — Grafloria</title>
<link rel="stylesheet" href="../shell/demo.css">
<header id="demo-head"></header>
<div id="canvas"></div>
<script type="module">
import { render, registerTool, getNodeSizing, clampSizeToConstraints, resolveAspectRatio } from '../shell/grafloria.js';
import { defineDemo, check } from '../shell/demo.js';

// TWO resizers on one page, mirroring React Flow's pair:
//
//   1. The BUILT-IN resizer (RF's <NodeResizer/>): select a node and the
//      renderer paints 4 corner dots + 4 edge lines with per-handle cursors;
//      every handle is live through the default pointer pipeline.
//   2. A CUSTOM resize control (RF's <NodeResizeControl/>): a corner-resize
//      gesture registered through the public `registerTool` seam — it works
//      WITHOUT selecting, and demonstrates that a host can build its own grip.
//      The CLAMP is the shipped node-sizing contract (min/max/aspect), read off
//      the node's own metadata.sizing and applied on every move — DURING the
//      gesture, not fixed up at the end.
function installResizer(host, api) {
  const FLOOR = { floorWidth: 20, floorHeight: 20 };
  let g = null;
  const se = (n) => ({ x: n.position.x + n.size.width, y: n.position.y + n.size.height });
  registerTool({
    id: 'demo-resize',
    priority: 20,
    hitTest: (e, hit) => {
      if (!hit.node) return false;
      const c = se(hit.node);
      return Math.hypot(e.world.x - c.x, e.world.y - c.y) <= 22;   // near the SE corner
    },
    onPointerDown: (e, hit) => {
      g = { node: hit.node, w0: hit.node.size.width, h0: hit.node.size.height, x0: e.world.x, y0: e.world.y };
    },
    onPointerMove: (e) => {
      if (!g) return;
      const sizing = getNodeSizing(g.node);
      let { width, height } = clampSizeToConstraints(g.w0 + (e.world.x - g.x0), g.h0 + (e.world.y - g.y0), sizing, FLOOR);
      const aspect = resolveAspectRatio(sizing, { width: g.w0, height: g.h0 });
      if (aspect) height = width / aspect;
      g.node.setSize(width, height);
    },
    onPointerUp: () => { g = null; },
  });
}

defineDemo({
  name: 'Node resizer',
  blurb: 'Two resizers, like React Flow\'s pair: SELECT a node for the built-in one — painted corner dots + edge lines, per-handle cursors, every handle live — or grab the bottom-right corner WITHOUT selecting for a custom control registered through the public registerTool seam. Both clamp to the node\'s declared min/max/aspect DURING the gesture.',
  howTo: [
    'Click the "80–260 wide" node to select it: the renderer paints the full resizer — four white corner dots and four edge lines, each with its own resize cursor (nwse/nesw/ns/ew).',
    'Drag ANY corner or edge: the box resizes from that side, the opposite side pinned, clamped to 80–260 × 60–200 mid-drag.',
    'Now click empty canvas to deselect, and press within ~20px of the node\'s bottom-right corner: it STILL resizes — that gesture is a custom control on the public registerTool seam (React Flow\'s NodeResizeControl), no selection needed.',
    'Haul the corner far right and down: the size stops DEAD at 260×200 — min/max come off the node\'s own metadata.sizing.',
    'Drag the corner deep into the node: it floors at 80×60, never inverting.',
    'Resize the "aspect locked" node: whatever path you drag, the box holds its 1.6 ratio.',
    'Press anywhere else on a node and drag: that is still a plain move — only the corner zone (or a selected node\'s handles) resizes.',
  ],
  reactflow: 'Node Resizer',

  async setup(ctx) {
    const api = render({
      nodes: [
        { id: 'clamp', position: { x: 120, y: 120 }, size: { width: 160, height: 100 }, label: '80–260 wide',
          metadata: { sizing: { minWidth: 80, minHeight: 60, maxWidth: 260, maxHeight: 200 } } },
        { id: 'ratio', position: { x: 560, y: 120 }, size: { width: 160, height: 100 }, label: 'aspect locked',
          metadata: { sizing: { aspectLock: true } } },   // locks to 160/100 = 1.6
      ],
      edges: [],
    }, ctx.host);
    ctx.instance = api;
    ctx.diagram = api.getModel();
    installResizer(ctx.host, api);

    ctx.fire = (type, w) => {
      const rect = ctx.host.getBoundingClientRect();
      const c = api.viewport.worldToClient(w.x, w.y, rect);
      ctx.host.dispatchEvent(new PointerEvent(({ mousedown: 'pointerdown', mousemove: 'pointermove', mouseup: 'pointerup' })[type] ?? type, { bubbles: true, pointerId: 1, pointerType: 'mouse', clientX: c.x, clientY: c.y, button: 0 }));
    };
    ctx.corner = (id) => { const n = ctx.diagram.getNode(id); return { x: n.position.x + n.size.width, y: n.position.y + n.size.height }; };
    await ctx.tick();
  },

  async assert(ctx) {
    const m = ctx.diagram;
    const clamp = m.getNode('clamp');

    // 1. MAX clamp DURING the gesture — through the CUSTOM registerTool control,
    //    with NO selection (RF NodeResizeControl behaviour). Grab the SE corner
    //    and haul it 1000px right — far past the 260 max. Assert the cap holds
    //    mid-drag, BEFORE releasing.
    check(!clamp.isSelected(), 'the custom-control asserts run unselected (selection is the built-in path)');
    const c0 = ctx.corner('clamp');
    ctx.fire('mousedown', { x: c0.x - 3, y: c0.y - 3 });
    ctx.fire('mousemove', { x: c0.x + 1000, y: c0.y + 40 });     // still dragging
    ctx.instance.renderNow();
    check(clamp.size.width === 260,
      `width should be clamped to its 260 max DURING the drag, is ${clamp.size.width}`);
    check(clamp.size.height <= 200,
      `height should be clamped to its 200 max, is ${clamp.size.height}`);
    ctx.fire('mouseup', { x: c0.x + 1000, y: c0.y + 40 });

    // 2. MIN clamp: drag the corner far into the node — width floors at 80, not 0/negative.
    const c1 = ctx.corner('clamp');
    ctx.fire('mousedown', { x: c1.x - 3, y: c1.y - 3 });
    ctx.fire('mousemove', { x: clamp.position.x - 500, y: clamp.position.y - 500 });
    ctx.instance.renderNow();
    check(clamp.size.width === 80, `width should floor at its 80 min, is ${clamp.size.width}`);
    check(clamp.size.height === 60, `height should floor at its 60 min, is ${clamp.size.height}`);
    ctx.fire('mouseup', { x: clamp.position.x - 500, y: clamp.position.y - 500 });

    // 3. ASPECT lock: resize the ratio node and its width/height ratio is preserved
    //    (1.6), even though we only dragged the corner arbitrarily.
    const ratio = m.getNode('ratio');
    const r0 = ctx.corner('ratio');
    ctx.fire('mousedown', { x: r0.x - 3, y: r0.y - 3 });
    ctx.fire('mousemove', { x: r0.x + 120, y: r0.y + 8 });      // mostly wider, barely taller
    ctx.instance.renderNow();
    const ar = ratio.size.width / ratio.size.height;
    check(Math.abs(ar - 1.6) < 0.02,
      `aspect lock should hold the 1.6 ratio during resize, got ${ar.toFixed(3)}`);
    check(ratio.size.width > 160, 'the aspect node should actually have grown');
    ctx.fire('mouseup', { x: r0.x + 120, y: r0.y + 8 });

    // 4. THE BUILT-IN RESIZER (RF <NodeResizer/> parity): selecting the node
    //    paints the tool layer — 4 corner dots + 4 edge lines — and EVERY
    //    handle is live, not just the custom SE grip. Select, check the paint,
    //    check a handle cursor, then drag the NW corner and prove the OPPOSITE
    //    (SE) corner stays pinned.
    {
      const centre = { x: clamp.position.x + clamp.size.width / 2, y: clamp.position.y + clamp.size.height / 2 };
      ctx.fire('mousedown', centre);
      ctx.fire('mouseup', centre);
      await ctx.tick();
      check(clamp.isSelected(), 'clicking the node centre should select it');
      ctx.instance.renderNow();
      await ctx.tick();

      const dots = ctx.host.querySelectorAll('.resize-tool-layer .resize-handle-dot');
      const lines = ctx.host.querySelectorAll('.resize-tool-layer .resize-edge-line');
      check(dots.length === 4, `selecting should paint 4 corner dots, found ${dots.length}`);
      check(lines.length === 4, `selecting should paint 4 edge lines, found ${lines.length}`);

      // Hovering the NW dot advertises the diagonal resize cursor.
      ctx.fire('mousemove', { x: clamp.position.x, y: clamp.position.y });
      check(ctx.host.style.cursor === 'nwse-resize',
        `hovering the NW corner should show nwse-resize, host cursor is "${ctx.host.style.cursor}"`);

      // NW drag through the DEFAULT pipeline: box grows from that corner,
      // SE corner pinned (the node is at its 80×60 floor here).
      const seFixed = { x: clamp.position.x + clamp.size.width, y: clamp.position.y + clamp.size.height };
      const nw = { x: clamp.position.x, y: clamp.position.y };
      ctx.fire('mousedown', nw);
      ctx.fire('mousemove', { x: nw.x - 60, y: nw.y - 40 });
      ctx.instance.renderNow();
      check(clamp.size.width > 80 && clamp.size.height > 60,
        `dragging the NW handle should grow the box (is ${clamp.size.width}×${clamp.size.height})`);
      check(Math.abs((clamp.position.x + clamp.size.width) - seFixed.x) < 1 &&
            Math.abs((clamp.position.y + clamp.size.height) - seFixed.y) < 1,
        'the OPPOSITE (SE) corner must stay pinned during a NW drag');
      ctx.fire('mouseup', { x: nw.x - 60, y: nw.y - 40 });
      await ctx.tick();
    }
  },
});
</script>
