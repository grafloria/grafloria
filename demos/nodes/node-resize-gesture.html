<meta charset="utf-8">
<title>Node resize gesture — Grafloria</title>
<link rel="stylesheet" href="../shell/demo.css">
<style>
  /* The 8 resize handles, drawn in the demo's own overlay. The DEFAULT SVG
     renderer paints a selection outline but not the handles (only the Angular
     renderer does), so the demo draws them from the SAME geometry the binder
     hit-tests — a faithful picture of a live gesture, not a second source of truth. */
  /* #canvas must be the positioning context: an absolute overlay inside an
     UNPOSITIONED parent anchors to the page instead, painting every handle one
     header-height above the node (the screenshot audit caught exactly that —
     the gesture itself was fine, only this overlay was adrift). */
  #canvas { position: relative; }
  #handles { position: absolute; inset: 0; pointer-events: none; }
  #handles .h {
    position: absolute; width: 10px; height: 10px; margin: -5px 0 0 -5px;
    background: #fff; border: 2px solid #3b82f6; box-sizing: border-box; border-radius: 2px;
  }
</style>
<header id="demo-head"></header>
<div id="canvas"><div id="handles"></div></div>
<script type="module">
import { render } from '../shell/grafloria.js';
import { defineDemo, check } from '../shell/demo.js';

// The 8 handles at a node's box, as unit (u,v) anchors — the exact set
// SelectionToolsController lays out. World point = position + (u·w, v·h).
const ANCHORS = [
  ['nw', 0, 0], ['n', 0.5, 0], ['ne', 1, 0], ['e', 1, 0.5],
  ['se', 1, 1], ['s', 0.5, 1], ['sw', 0, 1], ['w', 0, 0.5],
];

defineDemo({
  name: 'Node resize gesture',
  blurb: 'Select a node, then drag a resize handle — a REAL pointer drag through the default pipeline (no host wiring, no registerTool). Any corner resizes and pins the opposite one; the declared min/max/aspect clamp the size DURING the gesture, and one release is one undo step.',
  howTo: [
    'Click the "80–260 wide" node to select it — a dashed outline plus eight resize handles (four corners, four edge midpoints) appear, painted from the exact geometry the binder hit-tests.',
    'Press the bottom-right handle and drag outward — the node resizes live, clamped to its 80–260 × 60–200 limits mid-drag, not fixed up afterwards.',
    'Grab the TOP-LEFT corner instead — it resizes from there too, and the OPPOSITE (bottom-right) corner stays pinned: every corner is a live handle, not just one.',
    'Try to drag past the max: the box refuses to grow beyond 260×200 while the pointer keeps going.',
    'Resize the second node — its aspect ratio stays locked at 1.6 whichever way you pull.',
    'Press ⌘Z / Ctrl+Z — the whole resize gesture is ONE undo step.',
  ],
  reactflow: 'Node Resizer',

  async setup(ctx) {
    const api = render({
      nodes: [
        { id: 'clamp', position: { x: 140, y: 130 }, size: { width: 160, height: 100 },
          data: { label: '80–260 wide' },
          metadata: { sizing: { minWidth: 80, minHeight: 60, maxWidth: 260, maxHeight: 200 } } },
        { id: 'ratio', position: { x: 560, y: 130 }, size: { width: 160, height: 100 },
          data: { label: 'aspect 1.6' },
          metadata: { sizing: { aspectLock: true } } },   // locks to 160/100 = 1.6
      ],
      edges: [],
    }, ctx.host);
    ctx.instance = api;
    ctx.diagram = api.getModel();

    // A real pointer event, pointerType 'mouse', through the PUBLIC element. This is
    // the whole point: the binder's pointer fork routes mouse/pen down the same
    // ladder, so a synthetic PointerEvent drives EXACTLY what a mouse does.
    ctx.fire = (type, world, buttons = 1) => {
      const rect = ctx.host.getBoundingClientRect();
      const c = api.viewport.worldToClient(world.x, world.y, rect);
      ctx.host.dispatchEvent(new PointerEvent(({ mousedown: 'pointerdown', mousemove: 'pointermove', mouseup: 'pointerup' })[type] ?? type, {
        bubbles: true, cancelable: true, pointerType: 'mouse', pointerId: 1,
        isPrimary: true, button: type === 'pointermove' ? -1 : 0,
        buttons: type === 'pointerup' ? 0 : buttons,
        clientX: c.x, clientY: c.y,
      }));
    };
    // The SE (bottom-right) corner handle of a node, in world coords.
    ctx.handleSE = (id) => {
      const n = ctx.diagram.getNode(id);
      return { x: n.position.x + n.size.width, y: n.position.y + n.size.height };
    };
    // The NW (top-left) corner handle — dragging it resizes AND moves the origin,
    // which is why RF corner-resize pins the opposite corner instead of the origin.
    ctx.handleNW = (id) => {
      const n = ctx.diagram.getNode(id);
      return { x: n.position.x, y: n.position.y };
    };
    // Select a node WITHOUT resizing: press+release on its centre.
    ctx.select = async (id) => {
      const n = ctx.diagram.getNode(id);
      const centre = { x: n.position.x + n.size.width / 2, y: n.position.y + n.size.height / 2 };
      ctx.fire('pointerdown', centre);
      ctx.fire('pointerup', centre);
      await ctx.tick();
    };

    // Paint the handle overlay every frame off the selected node's live geometry.
    const overlay = document.getElementById('handles');
    const paint = () => {
      const rect = ctx.host.getBoundingClientRect();
      const sel = ctx.diagram.getNodes().filter((n) => n.isSelected());
      overlay.innerHTML = '';
      if (sel.length === 1) {
        const n = sel[0];
        for (const [, u, v] of ANCHORS) {
          const c = api.viewport.worldToClient(n.position.x + u * n.size.width, n.position.y + v * n.size.height, rect);
          const el = document.createElement('div');
          el.className = 'h';
          el.style.left = (c.x - rect.left) + 'px';
          el.style.top = (c.y - rect.top) + 'px';
          overlay.appendChild(el);
        }
      }
      ctx._raf = requestAnimationFrame(paint);
    };
    paint();

    await ctx.tick();
  },

  async assert(ctx) {
    const m = ctx.diagram;

    // ---- 1. MAX clamp, applied DURING the drag (you cannot drag past it) --------
    await ctx.select('clamp');
    const clamp = m.getNode('clamp');
    check(clamp.isSelected(), 'the node must be selected before its handles exist');

    const se = ctx.handleSE('clamp');
    ctx.fire('pointerdown', { x: se.x, y: se.y });
    ctx.fire('pointermove', { x: se.x + 1000, y: se.y + 1000 });  // haul FAR past the 260/200 cap
    ctx.instance.renderNow();
    check(clamp.size.width === 260, `width should be capped at its 260 max MID-DRAG, is ${clamp.size.width}`);
    check(clamp.size.height === 200, `height should be capped at its 200 max MID-DRAG, is ${clamp.size.height}`);
    ctx.fire('pointerup', { x: se.x + 1000, y: se.y + 1000 });

    // The node grew and its NW corner (the anchored edge) stayed put.
    check(clamp.position.x === 140 && clamp.position.y === 130, 'the anchored NW corner must not move');

    // ---- 2. MIN clamp: dragging inward floors at the min, never past 0 ----------
    const se2 = ctx.handleSE('clamp');
    ctx.fire('pointerdown', { x: se2.x, y: se2.y });
    ctx.fire('pointermove', { x: clamp.position.x - 500, y: clamp.position.y - 500 });
    ctx.instance.renderNow();
    check(clamp.size.width === 80, `width should floor at its 80 min, is ${clamp.size.width}`);
    check(clamp.size.height === 60, `height should floor at its 60 min, is ${clamp.size.height}`);
    ctx.fire('pointerup', { x: clamp.position.x - 500, y: clamp.position.y - 500 });

    // ---- 2b. EVERY CORNER is a handle: the NW corner resizes too, and pins the
    //     OPPOSITE (SE) corner. RF's resizer isn't a single bottom-right grip —
    //     grab any of the four corners and the box grows from there, the far
    //     corner staying put. (Node is at its 80×60 floor, anchored at 140,130.)
    const seFixed = { x: clamp.position.x + clamp.size.width, y: clamp.position.y + clamp.size.height }; // (220,190)
    const nw = ctx.handleNW('clamp');
    ctx.fire('pointerdown', { x: nw.x, y: nw.y });
    ctx.fire('pointermove', { x: nw.x - 80, y: nw.y - 60 });   // haul the TOP-LEFT corner out
    ctx.instance.renderNow();
    check(clamp.size.width > 80 && clamp.size.height > 60,
      `dragging the NW handle should grow the box from that corner (is ${clamp.size.width}×${clamp.size.height})`);
    check(clamp.position.x < 140 && clamp.position.y < 130,
      `the NW corner (and the node origin) should have moved up-left (pos ${clamp.position.x},${clamp.position.y})`);
    check(Math.abs((clamp.position.x + clamp.size.width) - seFixed.x) < 1 &&
          Math.abs((clamp.position.y + clamp.size.height) - seFixed.y) < 1,
      `the OPPOSITE (SE) corner must stay pinned at ${seFixed.x},${seFixed.y} (is ${clamp.position.x + clamp.size.width},${clamp.position.y + clamp.size.height})`);
    ctx.fire('pointerup', { x: nw.x - 80, y: nw.y - 60 });

    // ---- 3. ASPECT lock holds the ratio through an arbitrary corner drag --------
    await ctx.select('ratio');
    const ratio = m.getNode('ratio');
    const r = ctx.handleSE('ratio');
    ctx.fire('pointerdown', { x: r.x, y: r.y });
    ctx.fire('pointermove', { x: r.x + 120, y: r.y + 8 });   // mostly wider, barely taller
    ctx.instance.renderNow();
    const ar = ratio.size.width / ratio.size.height;
    check(Math.abs(ar - 1.6) < 0.02, `aspect lock should hold the 1.6 ratio, got ${ar.toFixed(3)}`);
    check(ratio.size.width > 160, 'the aspect node should actually have grown');
    ctx.fire('pointerup', { x: r.x + 120, y: r.y + 8 });

    // ---- 4. ONE release == ONE undo step ----------------------------------------
    const cm = ctx.instance.getEngine().commandManager;
    await new Promise((res) => setTimeout(res, 0));   // execute() is async
    check(cm.canUndo(), 'the resize must have committed an undoable command');
    const wBefore = ratio.size.width;
    await cm.undo();
    check(ratio.size.width < wBefore, `undo should shrink the aspect node back, ${ratio.size.width} vs ${wBefore}`);
  },
});
</script>
