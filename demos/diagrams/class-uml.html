<meta charset="utf-8">
<title>Class diagram (UML) — Grafloria</title>
<link rel="stylesheet" href="../shell/demo.css">
<header id="demo-head"></header>
<div id="canvas"></div>
<script type="module">
import { render, umlDiagram } from '../shell/grafloria.js';
import { defineDemo, check } from '../shell/demo.js';

// A UML class diagram in PURE DATA, via the reusable diagram kit
// (`umlDiagram` from @grafloria/element). The kit owns the three-compartment
// class-card look, the relationship notation (hollow triangle, diamonds, …),
// the selection styling and the routing — this page just declares the model.
// See diagrams/uml-relationships.html for the FULL relationship vocabulary.
const SPEC = umlDiagram({
  classes: [
    { id: 'Animal', abstract: true, position: { x: 380, y: 40 },
      attributes: ['# name: String', '# age: int'],
      methods: ['+ speak(): void', '+ move(): void'] },
    { id: 'Dog', position: { x: 150, y: 320 },
      attributes: ['+ breed: String'],
      methods: ['+ speak(): void', '+ fetch(): void'] },
    { id: 'Cat', position: { x: 620, y: 320 },
      attributes: ['+ indoor: bool'],
      methods: ['+ speak(): void', '+ purr(): void'] },
    { id: 'Owner', position: { x: 380, y: 600 },
      attributes: ['+ name: String'],
      methods: ['+ adopt(p): void'] },
  ],
  relationships: [
    { from: 'Dog', to: 'Animal', kind: 'inheritance' },
    { from: 'Cat', to: 'Animal', kind: 'inheritance' },
    { from: 'Owner', to: 'Dog', kind: 'aggregation', label: 'owns' },
    { from: 'Owner', to: 'Cat', kind: 'aggregation', label: 'owns' },
  ],
});

defineDemo({
  name: 'Class diagram (UML)',
  blurb: 'A UML class diagram from PURE DATA via the reusable umlDiagram() kit: class boxes with name / attributes / methods compartments, hollow-triangle inheritance and hollow-diamond aggregation — look, selection and routing all from the kit.',
  howTo: [
    'Read a class box: a bold name compartment on top, then attributes (# protected, + public), then methods — three stacked compartments, all generated by the kit.',
    'Follow the inheritance: Dog and Cat point to Animal with a hollow triangle (△) — the UML "is-a" / generalization arrow. Animal\'s name is italic (abstract).',
    'Follow the aggregation: Owner connects to Dog and Cat with a hollow diamond (◇) at the Owner end — "an owner HAS pets" (a whole-part relationship).',
    'Read the source of this page: the whole diagram is one umlDiagram({ classes, relationships }) call — no CSS, no HTML trees, no arrow config. That is the reusable kit.',
  ],
  reactflow: 'Class Diagram',
  pro: true,

  async setup(ctx) {
    const api = render(SPEC, ctx.host);
    ctx.instance = api;
    ctx.diagram = api.getModel();
    SPEC.finalize(api);
    api.fitView?.(40);
    await ctx.tick();
  },

  async assert(ctx) {
    const host = ctx.host;
    // 1. Classes render as three-compartment kit cards.
    const animal = host.querySelector('[data-node-id="Animal"] foreignObject');
    check(!!animal, 'Animal class did not render as an HTML node');
    const names = [...host.querySelectorAll('.axk-uml-name')].map((e) => e.textContent);
    check(names.length === 4, `expected 4 class boxes, got ${names.length}: [${names}]`);
    const comps = host.querySelectorAll('[data-node-id="Animal"] .axk-uml-comp');
    check(comps.length === 2, `Animal should have attribute + method compartments, got ${comps.length}`);
    check((animal.textContent || '').includes('speak(): void'), 'Animal should list its methods');
    check(!!host.querySelector('.axk-uml-name.axk-abstract'), 'the abstract class should render italicised');

    // 2. UML relationship markers PAINT: inheritance triangles + aggregation diamonds.
    check(ctx.diagram.getLinks().length === 4, `expected 4 relationships, got ${ctx.diagram.getLinks().length}`);
    check(host.querySelectorAll('.arrow-generalization').length === 2, 'expected 2 inheritance (generalization) triangles');
    check(host.querySelectorAll('.arrow-hollow-diamond').length === 2, 'expected 2 aggregation (hollow-diamond) markers');

    // 3. The kit stylesheet is present exactly once.
    check(document.querySelectorAll('#grafloria-diagram-kit-styles').length === 1, 'the kit stylesheet should be injected once');
  },
});
</script>
