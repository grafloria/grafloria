<div class="template-builder">
  <!-- Header Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left">
      <h1 class="title">Template Builder</h1>
      <span class="subtitle">Advanced Node Template Editor</span>
    </div>

    <div class="toolbar-right">
      <!-- Undo/Redo with NEW Button Component -->
      <app-button
        variant="ghost"
        size="sm"
        icon="↶"
        [iconOnly]="true"
        [disabled]="!(canUndo$ | async)"
        (clicked)="undo()">
      </app-button>
      <app-button
        variant="ghost"
        size="sm"
        icon="↷"
        [iconOnly]="true"
        [disabled]="!(canRedo$ | async)"
        (clicked)="redo()">
      </app-button>

      <div class="divider"></div>

      <!-- Actions with NEW Button Component -->
      <app-button
        variant="primary"
        size="sm"
        icon="💾"
        (clicked)="save()">
        Save
      </app-button>
      <app-button
        variant="secondary"
        size="sm"
        icon="🔄"
        (clicked)="reset()">
        Reset
      </app-button>
      <app-button
        variant="secondary"
        size="sm"
        icon="📥"
        (clicked)="exportTemplate()">
        Export
      </app-button>
      <app-button
        variant="secondary"
        size="sm"
        icon="📤"
        (clicked)="importTemplate()">
        Import
      </app-button>

      <div class="divider"></div>

      <!-- Toggles with NEW Button Component -->
      <app-button
        variant="ghost"
        size="sm"
        icon="☰"
        [iconOnly]="true"
        [class.active]="showSidebar"
        (clicked)="toggleSidebar()">
      </app-button>
      <app-button
        variant="ghost"
        size="sm"
        icon="📊"
        [iconOnly]="true"
        [class.active]="showBottomPanel"
        (clicked)="toggleBottomPanel()">
      </app-button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Left Sidebar: Template Library -->
    <div class="sidebar" *ngIf="showSidebar" [style.width.px]="leftPanelWidth">
      <app-template-sidebar
        (templateSelect)="onTemplateSelect($event)">
      </app-template-sidebar>
      <div class="resize-handle resize-handle-right" (mousedown)="startResize($event, 'left')"></div>
    </div>

    <!-- Center: Editors with Tabs -->
    <div class="editor-panel" [style.width.px]="editorPanelWidth">
      <div class="resize-handle resize-handle-right" (mousedown)="startResize($event, 'editor')"></div>
      <div class="panel-header">
        <div class="editor-tabs">
          <button
            class="tab"
            [class.active]="activeEditorTab === 'json'"
            (click)="activeEditorTab = 'json'">
            JSON Template
          </button>
          <button
            class="tab"
            [class.active]="activeEditorTab === 'html'"
            (click)="activeEditorTab = 'html'">
            HTML Layer
          </button>
          <button
            class="tab"
            [class.active]="activeEditorTab === 'css'"
            (click)="activeEditorTab = 'css'">
            CSS Styles
          </button>
        </div>
        <div class="panel-info">
          <!-- JSON Editor Actions (icon-only for compact layout) -->
          <div class="json-actions" *ngIf="activeEditorTab === 'json'">
            <app-button
              variant="primary"
              size="sm"
              icon="➕"
              [iconOnly]="true"
              (clicked)="openChildNodeWizard()"
              title="Add Child Node - Guided wizard">
            </app-button>

            <app-button
              variant="secondary"
              size="sm"
              icon="🎨"
              [iconOnly]="true"
              (clicked)="openNodeLayerEditor()"
              title="Edit Node Layers - Place cursor inside node">
            </app-button>
          </div>

          <!-- Status Indicator -->
          <span class="status" *ngIf="editorState$ | async as state">
            <span class="dot" [class.valid]="state.isValid" [class.invalid]="!state.isValid"></span>
            {{ state.isValid ? 'Valid' : 'Invalid' }}
          </span>
        </div>
      </div>
      <div class="panel-body">
        <app-monaco-editor
          *ngIf="activeEditorTab === 'json'"
          [content]="(editorState$ | async)?.json || ''"
          [language]="'json'"
          [theme]="'vs'"
          [minimap]="true"
          [lineNumbers]="'on'"
          (contentChange)="onJsonChange($event)"
          (editorReady)="onEditorReady($event)">
        </app-monaco-editor>
        <app-monaco-editor
          *ngIf="activeEditorTab === 'html'"
          [content]="(editorState$ | async)?.html || ''"
          [language]="'html'"
          [theme]="'vs'"
          [minimap]="true"
          [lineNumbers]="'on'"
          (contentChange)="onHtmlChange($event)">
        </app-monaco-editor>
        <app-monaco-editor
          *ngIf="activeEditorTab === 'css'"
          [content]="(editorState$ | async)?.css || ''"
          [language]="'css'"
          [theme]="'vs'"
          [minimap]="true"
          [lineNumbers]="'on'"
          (contentChange)="onCssChange($event)">
        </app-monaco-editor>
      </div>
    </div>

    <!-- Right: NEW Multi-Tab Panel (Preview/Data/Ports) -->
    <div class="right-panel">
      <div class="right-panel-tabs">
        <button
          class="tab"
          [class.active]="activeRightTab === 'preview'"
          (click)="activeRightTab = 'preview'">
          Preview
        </button>
        <button
          class="tab"
          [class.active]="activeRightTab === 'data'"
          (click)="activeRightTab = 'data'">
          Test Data
        </button>
        <button
          class="tab"
          [class.active]="activeRightTab === 'ports'"
          (click)="activeRightTab = 'ports'">
          Ports
        </button>
      </div>

      <div class="right-panel-content">
        <!-- Preview Panel -->
        <app-preview-panel
          *ngIf="activeRightTab === 'preview'"
          [template]="(editorState$ | async)?.json || ''"
          [htmlLayer]="(editorState$ | async)?.html || ''"
          [cssLayer]="(editorState$ | async)?.css || ''">
        </app-preview-panel>

        <!-- NEW: Data Testing Panel -->
        <app-data-testing-panel
          *ngIf="activeRightTab === 'data'"
          [template]="getCurrentTemplate()"
          [data]="testData"
          (dataChange)="onTestDataChange($event)">
        </app-data-testing-panel>

        <!-- NEW: Port Configuration Panel -->
        <app-port-config-panel
          *ngIf="activeRightTab === 'ports'"
          [portsConfig]="getCurrentTemplate()?.structure?.ports || { enabled: false }"
          (portsConfigChange)="onPortsConfigChange($event)">
        </app-port-config-panel>
      </div>
    </div>

    <!-- Far Right: Documentation Sidebar (Collapsible) -->
    <div class="docs-sidebar" *ngIf="showDocsPanel">
      <div class="panel-header">
        <h3>Documentation</h3>
        <button class="close-panel-btn" (click)="toggleDocsPanel()" title="Close">×</button>
      </div>
      <app-documentation-sidebar></app-documentation-sidebar>
    </div>

    <!-- Far Right: Snippet Panel (Collapsible) -->
    <div class="snippet-panel-container" *ngIf="showSnippetsPanel">
      <div class="panel-header">
        <h3>Code Snippets</h3>
        <button class="close-panel-btn" (click)="toggleSnippetsPanel()" title="Close">×</button>
      </div>
      <app-snippet-panel
        (insertSnippet)="onSnippetInsert($event)">
      </app-snippet-panel>
    </div>

    <!-- Right Edge: Collapsed Panel Tabs -->
    <div class="right-edge-tabs">
      <button
        class="edge-tab"
        [class.active]="showDocsPanel"
        (click)="toggleDocsPanel()"
        title="Documentation">
        <span class="tab-icon">📚</span>
        <span class="tab-label">Docs</span>
      </button>
      <button
        class="edge-tab"
        [class.active]="showSnippetsPanel"
        (click)="toggleSnippetsPanel()"
        title="Code Snippets">
        <span class="tab-icon">✨</span>
        <span class="tab-label">Snippets</span>
      </button>
    </div>
  </div>

  <!-- Bottom: NEW Multi-Tab Panel (Events/Performance/Validation) -->
  <div class="bottom-panel" *ngIf="showBottomPanel" [style.height.px]="bottomPanelHeight">
    <div class="resize-handle resize-handle-top" (mousedown)="startResize($event, 'bottom')"></div>
    <div class="bottom-panel-tabs">
      <button
        class="tab"
        [class.active]="activeBottomTab === 'events'"
        (click)="activeBottomTab = 'events'">
        Event Monitor
      </button>
      <button
        class="tab"
        [class.active]="activeBottomTab === 'performance'"
        (click)="activeBottomTab = 'performance'">
        Performance
      </button>
      <button
        class="tab"
        [class.active]="activeBottomTab === 'validation'"
        (click)="activeBottomTab = 'validation'">
        Validation
      </button>
    </div>

    <div class="bottom-panel-content">
      <!-- NEW: Event Monitor Panel -->
      <app-event-monitor-panel
        *ngIf="activeBottomTab === 'events'">
      </app-event-monitor-panel>

      <!-- Performance Panel -->
      <app-performance-panel
        *ngIf="activeBottomTab === 'performance'"
        [metrics]="performanceMetrics$ | async">
      </app-performance-panel>

      <!-- Validation Panel (Placeholder) -->
      <div *ngIf="activeBottomTab === 'validation'" class="validation-placeholder">
        <div class="placeholder-content">
          <div class="placeholder-icon">✓</div>
          <div class="placeholder-text">Validation Panel</div>
          <div class="placeholder-hint">Coming soon... Template validation and linting</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Child Node Wizard Modal -->
  <app-child-node-wizard
    [isOpen]="showChildNodeWizard"
    (generate)="onChildNodeGenerate($event)"
    (close)="showChildNodeWizard = false">
  </app-child-node-wizard>

  <!-- Node Layer Editor Modal -->
  <app-node-layer-editor
    [isOpen]="showNodeLayerEditor"
    [nodePath]="currentNodePath"
    [htmlLayer]="currentNodeHtml"
    [cssLayer]="currentNodeCss"
    (save)="onNodeLayersSave($event)"
    (close)="showNodeLayerEditor = false">
  </app-node-layer-editor>
</div>
