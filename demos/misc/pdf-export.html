<meta charset="utf-8">
<title>PDF export — Grafloria</title>
<link rel="stylesheet" href="../shell/demo.css">
<style>
  .bar { display: flex; gap: 8px; align-items: center; padding: 10px 24px; border-bottom: 1px solid rgba(127,127,127,.25); flex-wrap: wrap; }
  .bar button { padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(127,127,127,.4); background: transparent; color: inherit; cursor: pointer; font: inherit; }
  .note { font-size: 12px; opacity: .75; margin-left: auto; }
  #canvas { height: calc(100vh - 210px); }
  code { background: rgba(127,127,127,.15); padding: 1px 5px; border-radius: 4px; }
</style>
<header id="demo-head"></header>
<div class="bar">
  <button id="dl-pdf">download PDF</button>
  <span class="note">A true VECTOR PDF — paths stay paths, text stays selectable text — with zero new dependencies.</span>
</div>
<div id="canvas"></div>
<script type="module">
import { render } from '../shell/grafloria.js';
import { defineDemo, check } from '../shell/demo.js';

const SPEC = {
  nodes: [
    { id: 'a', label: 'Requirements', position: { x: 60,  y: 90 },  size: { width: 190, height: 78 }, style: { fill: '#eef2ff', stroke: '#4f46e5', strokeWidth: 2 } },
    { id: 'b', label: 'Design',       position: { x: 340, y: 90 },  size: { width: 190, height: 78 }, style: { fill: '#ffffff', stroke: '#0f172a', strokeWidth: 2 } },
    { id: 'c', label: 'Ship',         position: { x: 620, y: 90 },  size: { width: 190, height: 78 }, style: { fill: '#ecfdf5', stroke: '#059669', strokeWidth: 2 } },
  ],
  edges: [{ id: 'e1', source: 'a', target: 'b' }, { id: 'e2', source: 'b', target: 'c' }],
};

/** Uint8Array → a Latin-1 string so we can grep the PDF's structure by bytes. */
const bytesToLatin1 = (u8) => { let s = ''; for (let i = 0; i < u8.length; i++) s += String.fromCharCode(u8[i]); return s; };

defineDemo({
  name: 'PDF export',
  blurb: 'A real vector PDF — selectable text and true paths, not a rasterized screenshot — built with zero new dependencies.',
  howTo: [
    'Click "download PDF" — diagram.pdf downloads.',
    'Open it and drag-select the labels: Requirements, Design and Ship highlight and copy out as REAL text — vector glyphs, not pixels.',
    'Zoom deep into the page — node borders and edges stay razor-sharp: true path operators, and the file embeds no raster image at all.',
    'Drag a node on the canvas and download again — the PDF tracks the live diagram (an unchanged view exports deterministically).',
  ],
  reactflow: 'Download Image',

  async setup(ctx) {
    const api = render(SPEC, ctx.host);
    ctx.instance = api;
    api.renderNow();
    document.getElementById('dl-pdf').onclick = async () => {
      const href = await api.export('pdf');
      const a = document.createElement('a');
      a.href = href;
      a.download = 'diagram.pdf';
      a.click();
      // On-page feedback: a download alone leaves the page unchanged and reads
      // as a dead button.
      let el = document.getElementById('dl-note');
      if (!el) { el = document.createElement('span'); el.id = 'dl-note'; el.style.cssText = 'font:12px ui-monospace,monospace;opacity:.8;margin-left:8px'; document.getElementById('dl-pdf').parentElement.appendChild(el); }
      el.textContent = `diagram.pdf saved (${Math.round(href.length * 3 / 4 / 1024)} KB)`;
    };
    await ctx.tick();
  },

  async assert(ctx) {
    const result = ctx.instance.exportPdf();
    check(result && result.pdf instanceof Uint8Array, 'exportPdf() did not return a Uint8Array of PDF bytes');
    check(result.pdf.length > 400, `the PDF is implausibly small (${result.pdf.length} bytes)`);

    const s = bytesToLatin1(result.pdf);

    // 1. It is a real, well-formed PDF.
    check(s.startsWith('%PDF-'), `not a PDF: starts with ${JSON.stringify(s.slice(0, 8))}`);
    check(s.includes('/Type /Catalog') || s.includes('/Type/Catalog'), 'the PDF has no document catalog');
    check(s.trimEnd().endsWith('%%EOF'), 'the PDF is truncated — no %%EOF trailer');

    // 2. THE ONE THAT MATTERS: it is VECTOR, not a rasterized image.
    //    (a) the node LABELS are real, selectable text — a text-show operator.
    const streams = [...s.matchAll(/stream\r?\n([\s\S]*?)\r?\nendstream/g)].map((m) => m[1]).join('\n');
    check(/BT[\s\S]*?(Tj|TJ)/.test(streams), 'the PDF has no text-drawing operators — the labels were not vector text');
    //    (b) real path/fill operators draw the node bodies.
    check(/\bre\b/.test(streams) && /\b(f|B|S)\b/.test(streams), 'the PDF has no vector path/fill operators');
    //    (c) and it is NOT an embedded raster image masquerading as a diagram.
    check(!s.includes('/Subtype /Image') && !s.includes('/Subtype/Image'), 'the PDF embeds a raster IMAGE — it is not a true vector export');

    // 3. The font is a real PDF font resource (selectable text needs one).
    check(s.includes('/Font') || s.includes('/BaseFont'), 'the PDF declares no font — the text would not be selectable');

    // 4. Determinism sanity: a second export of the same view yields the same size.
    const again = ctx.instance.exportPdf();
    check(Math.abs(again.pdf.length - result.pdf.length) <= 8, `two exports of the same view differ wildly in size: ${result.pdf.length} vs ${again.pdf.length}`);
  },
});
</script>
