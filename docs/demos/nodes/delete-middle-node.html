<meta charset="utf-8">
<title>Delete a middle node — Grafloria</title>
<link rel="stylesheet" href="../shell/demo.css">
<header id="demo-head"></header>
<div id="canvas"></div>
<script type="module">
import { render, SnapController } from '../shell/grafloria.js';
import { defineDemo, check, checkEqual } from '../shell/demo.js';

defineDemo({
  name: 'Delete the middle node',
  blurb: 'Delete B out of A→B→C and the chain HEALS: its two edges cascade away with it, and a fresh A→C wire bridges the gap. Built from getLinks() + the shipped link command, so the bridge is a real, undoable edge.',
  howTo: [
    'Click "B (middle)" to select it — its outline highlights.',
    'Press Delete (or Backspace): B vanishes, its two edges (A→B, B→C) go with it, and in their place ONE new A→C wire appears. The predecessors reconnect to the successors across the gap.',
    'Read the survivors: A and C are still there, now joined DIRECTLY by the bridge edge — not left stranded, and with no wire dangling at a ghost node.',
    'Select an END node instead (A or C) and press Delete: no bridge appears. A span is only drawn when the deleted node had BOTH a predecessor and a successor — exactly getIncomers × getOutgoers.',
  ],
  reactflow: 'Delete Middle Node',

  async setup(ctx) {
    const api = render({
      nodes: [
        { id: 'a', position: { x: 60,  y: 120 }, size: { width: 160, height: 80 }, label: 'A' },
        { id: 'b', position: { x: 340, y: 120 }, size: { width: 160, height: 80 }, label: 'B (middle)' },
        { id: 'c', position: { x: 620, y: 120 }, size: { width: 160, height: 80 }, label: 'C' },
      ],
      edges: [
        { id: 'ab', source: 'a', target: 'b' },
        { id: 'bc', source: 'b', target: 'c' },
      ],
    }, ctx.host);
    ctx.instance = api;
    ctx.diagram = api.getModel();
    const eng = api.getEngine();
    const m = ctx.diagram;
    ctx.snap = new SnapController();

    // The RECONNECT, exactly as React Flow's onNodesDelete does it: read the
    // deleted node's predecessors (links that TARGET it) and successors (links
    // that SOURCE from it) BEFORE removal — this is getIncomers × getOutgoers —
    // then remove the node (which cascades its own edges away, no dangle), and
    // draw one bridge from each predecessor to each successor. The bridge is a
    // real link committed through the same command stack a hand-drawn wire uses,
    // so it is undoable and its geometry is fully initialised (not a raw stub).
    ctx.healDelete = async (id) => {
      const links = m.getLinks();
      const incomers = [...new Set(links.filter((l) => l.targetNodeId === id).map((l) => l.sourceNodeId))];
      const outgoers = [...new Set(links.filter((l) => l.sourceNodeId === id).map((l) => l.targetNodeId))];
      await eng.removeNode(id);                        // cascade + undoable
      for (const s of incomers) for (const t of outgoers) {
        if (s === t) continue;                          // never a self-loop bridge
        const sn = m.getNode(s), tn = m.getNode(t);
        if (!sn || !tn) continue;
        if (m.getLinks().some((l) => l.sourceNodeId === s && l.targetNodeId === t)) continue; // already joined
        const candidate = {
          sourcePort: sn.getPortBySide('right') ?? sn.getPorts()[0],
          targetPort: tn.getPortBySide('left') ?? tn.getPorts()[0],
          sourceNodeId: s, targetNodeId: t, distance: 0,
        };
        eng.commandManager.execute(ctx.snap.buildProximityLinkCommand(candidate));
      }
      api.renderNow();
    };

    // The real gesture a visitor makes: select a node, press Delete. We own the
    // key in the CAPTURE phase so the heal (remove-then-bridge) replaces the
    // engine's plain cascade-delete — a trusted keypress lands here before the
    // engine's own handler, and we stop it so the node is not removed twice.
    window.addEventListener('keydown', (e) => {
      if (e.key !== 'Delete' && e.key !== 'Backspace') return;
      const sel = m.getSelectedNodes ? m.getSelectedNodes() : [];
      if (!sel.length) return;
      e.preventDefault();
      e.stopImmediatePropagation();
      (async () => { for (const n of sel) await ctx.healDelete(n.id); })();
    }, true);

    await ctx.tick();
  },

  async assert(ctx) {
    const m = ctx.diagram;

    // Control: three nodes, two links, both attached to B.
    checkEqual(m.getNodes().length, 3, 'expected 3 nodes to start');
    checkEqual(m.getLinks().length, 2, 'expected 2 links to start');
    checkEqual(m.getLinksForNode('b').length, 2, 'both links should touch B');
    check(!!ctx.host.querySelector('[data-node-id="b"]'), 'B did not render');

    // THE ACT: heal-delete the middle node — the exact path the Delete key drives.
    const removedNode = m.getNode('b');
    await ctx.healDelete('b');

    // 1. B is gone — from the model AND the DOM.
    check(!!removedNode && removedNode.id === 'b', 'B did not exist before removal');
    check(m.getNode('b') === undefined, 'B is still in the model after the delete');
    check(ctx.host.querySelector('[data-node-id="b"]') === null, 'B is still in the DOM after the delete');

    // 2. CASCADE (no dangle): the two edges that touched B are gone from the model.
    //    A non-cascading remove would leave two edges pointing at a ghost node.
    check(m.getLink('ab') === undefined, 'link ab survived its endpoint being deleted');
    check(m.getLink('bc') === undefined, 'link bc survived its endpoint being deleted');
    check(!m.getLinks().some((l) => l.sourceNodeId === 'b' || l.targetNodeId === 'b'),
      'a link still references the deleted node B');

    // 3. THE TEETH: the chain RECONNECTED. Exactly ONE link remains, and it bridges
    //    A→C — the predecessor now joined straight to the successor. This is the
    //    behaviour React Flow's delete-middle-node exists to show; a plain cascade
    //    delete would leave A and C stranded with zero links.
    checkEqual(m.getLinks().length, 1, 'delete-middle should leave exactly one link (the A→C bridge)');
    const bridge = m.getLinks()[0];
    check(bridge.sourceNodeId === 'a' && bridge.targetNodeId === 'c',
      `the surviving link should bridge A→C, was ${bridge.sourceNodeId}→${bridge.targetNodeId}`);
    // The bridge is a real, painted edge (initialised geometry), not a raw stub.
    check(Array.isArray(bridge.points), 'the bridge link has no points array — it was not properly created');
    check(!!ctx.host.querySelector(`[data-link-id="${bridge.id}"] path[d]`), 'the A→C bridge did not paint a path');

    // 4. The survivors A and C are untouched.
    check(!!m.getNode('a') && !!m.getNode('c'), 'deleting B should not remove A or C');
  },
});
</script>
