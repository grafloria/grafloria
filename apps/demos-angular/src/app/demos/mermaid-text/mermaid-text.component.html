<div style="display:flex; height:100vh">
  <grafloria-diagram-canvas [(nodes)]="nodes" [(edges)]="edges"
    style="display:block; flex:1" />
  <div style="width:340px; border-left:1px solid #E3E7F2; display:flex; flex-direction:column; padding:10px; gap:8px">
    <div style="display:flex; gap:8px">
      <button (click)="export()" style="padding:6px 14px; border-radius:7px; border:0; background:#3B52D9; color:#fff; font-weight:600; cursor:pointer">⇢ Export</button>
      <button (click)="load()" style="padding:6px 14px; border-radius:7px; border:1px solid #94A5F0; background:#EEF1FE; color:#3B52D9; font-weight:600; cursor:pointer">⇠ Load</button>
    </div>
    <textarea [(ngModel)]="text" style="flex:1; font:12.5px/1.6 ui-monospace, Menlo, monospace; border:1px solid #E3E7F2; border-radius:8px; padding:10px; resize:none"></textarea>
  </div>
</div>
