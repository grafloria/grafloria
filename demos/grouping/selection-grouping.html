<meta charset="utf-8">
<title>Selection grouping — Grafloria</title>
<link rel="stylesheet" href="../shell/demo.css">
<header id="demo-head"></header>
<div id="canvas"></div>
<script type="module">
import { render } from '../shell/grafloria.js';
import { defineDemo, check } from '../shell/demo.js';

const encloses = (r, n) =>
  n.position.x >= r.x && n.position.y >= r.y &&
  n.position.x + n.size.width <= r.x + r.width &&
  n.position.y + n.size.height <= r.y + r.height;

defineDemo({
  name: 'Selection grouping',
  blurb: 'Marquee/ctrl-click a set of nodes, then bundle exactly that selection into a container — the group holds what you picked and nothing you did not.',
  howTo: [
    'Click "n1" — it becomes the selection.',
    'Hold Ctrl and click "n2": both nodes are now selected; the far-off "n3 (leave out)" stays unselected.',
    'Open the DevTools console and run `await __demo.run()`: it rebuilds that exact selection with real pointer events and bundles it into a container — a fitted frame wraps n1 and n2.',
    'Check the result: the group holds exactly {n1, n2} — the never-selected n3 is out, and the frame stops short of it.',
  ],
  reactflow: 'Selection Grouping',
  pro: true,

  async setup(ctx) {
    const api = render({
      nodes: [
        { id: 'n1', position: { x: 160, y: 140 }, size: { width: 120, height: 60 }, label: 'n1' },
        { id: 'n2', position: { x: 360, y: 160 }, size: { width: 120, height: 60 }, label: 'n2' },
        { id: 'n3', position: { x: 700, y: 300 }, size: { width: 120, height: 60 }, label: 'n3 (leave out)' },
      ],
      edges: [{ id: 'e1', source: 'n1', target: 'n2' }],
    }, ctx.host);
    ctx.instance = api;
    ctx.diagram = api.getModel();
    ctx.engine = api.getEngine();

    ctx.click = (id, additive) => {
      const n = ctx.diagram.getNode(id);
      const w = { x: n.position.x + n.size.width / 2, y: n.position.y + n.size.height / 2 };
      const rect = ctx.host.getBoundingClientRect();
      const c = api.viewport.worldToClient(w.x, w.y, rect);
      const opts = { bubbles: true, clientX: c.x, clientY: c.y, button: 0, ctrlKey: !!additive };
      ctx.host.dispatchEvent(new MouseEvent('mousedown', opts));
      ctx.host.dispatchEvent(new MouseEvent('mouseup', opts));
    };
    // Bundle the CURRENT selection into a fresh container (what a "Group" button does).
    ctx.groupSelected = async () => {
      const ids = ctx.diagram.getSelectedNodes().map((n) => n.id);
      const g = await ctx.engine.addGroup({ name: 'Group' });
      for (const id of ids) await ctx.engine.addToGroup(g.id, id);
      g.fitToContents(ctx.diagram);
      return g;
    };
    await ctx.tick();
  },

  async assert(ctx) {
    const m = ctx.diagram;

    // 1. Build a multi-selection with pointer clicks: select n1, ctrl-click n2.
    ctx.click('n1', false);
    ctx.click('n2', true);
    const selected = m.getSelectedNodes().map((n) => n.id).sort();
    check(selected.join(',') === 'n1,n2', `expected {n1,n2} selected, got {${selected}}`);

    // 2. Group the selection. THE TEETH: the container holds EXACTLY the selection —
    //    n1 and n2 in, n3 (never selected) out.
    const g = await ctx.groupSelected();
    check(g.members.has('n1') && g.members.has('n2'), `the group should contain the selected nodes, has ${[...g.members]}`);
    check(!g.members.has('n3'), 'the unselected n3 must NOT be in the group');
    check(g.members.size === 2, `the group should hold exactly 2 nodes, holds ${g.members.size}`);

    // 3. And the fitted frame wraps the pair but not the outsider.
    const box = g.getOuterBounds();
    check(encloses(box, m.getNode('n1')) && encloses(box, m.getNode('n2')), 'the frame should wrap the grouped pair');
    check(!encloses(box, m.getNode('n3')), 'the frame should not reach the ungrouped n3');
  },
});
</script>
