<div style="display:flex; height:100vh">

    [comments]="true" style="display:block; flex:1" />
  @if (store) {
    <div style="width:300px; border-left:1px solid #E3E7F2; overflow:auto">
      <grafloria-comment-panel [store]="store" />
    </div>
  }
</div>
