  #canvas .n8n-card.dangling .n8n-sub { color: #9b6bd6; }

  #canvas .cat-http    .n8n-badge { background: #0ea5e9; } #canvas .cat-http    { border-left-color: #0ea5e9; }
  #canvas .cat-set     .n8n-badge { background: #6366f1; } #canvas .cat-set     { border-left-color: #6366f1; }
  #canvas .cat-code    .n8n-badge { background: #475569; } #canvas .cat-code    { border-left-color: #475569; }
  #canvas .cat-merge   .n8n-badge { background: #06b6d4; } #canvas .cat-merge   { border-left-color: #06b6d4; }
  #canvas .cat-if      .n8n-badge { background: #f97316; } #canvas .cat-if      { border-left-color: #f97316; }

  /* ---- EXECUTION affordances (the n8n run language) ----------------------- */

<header id="demo-head"></header>
<div id="stage">
  <div id="palette">
    <div class="pal-title">Add node</div>
    <button class="pal-item" data-kind="http"><span class="pal-dot" style="background:#0ea5e9">🌐</span>HTTP Request</button>
    <button class="pal-item" data-kind="set"><span class="pal-dot" style="background:#6366f1">✏️</span>Edit Fields</button>
    <button class="pal-item" data-kind="code"><span class="pal-dot mono" style="background:#475569">{}</span>Code</button>
    <button class="pal-item" data-kind="if"><span class="pal-dot" style="background:#f97316">⋔</span>If</button>
    <button class="pal-item" data-kind="merge"><span class="pal-dot" style="background:#06b6d4">🔀</span>Merge</button>

<script type="module">
import { render } from '../shell/grafloria.js';
import { defineDemo, check } from '../shell/demo.js?v=drawer2';

// An interactive n8n workflow, rebuilt on the Grafloria engine — now with n8n's
// EXECUTION model, not just its looks:
//
//   • ▶ TEST WORKFLOW (bottom-centre, like n8n): the run walks the graph
//     topologically from the trigger; the executing node shows a SPINNER,
//     completed nodes a green CHECK badge, a failing node a red badge that
//     halts the run. Wires that carried data grow n8n's "n items" count pill.
//   • DATA FLOWS AS ITEMS: every node consumes input items and emits output
//     items (the trigger emits 1, the HTTP lookups emit 4 + 3, Merge appends
//     to 7, the AI Agent reduces to 1 verdict item); the If node routes items
//     to its true/false outputs by a real, editable condition — so the branch
//     taken ALTERNATES with the simulated data across runs.
//   • NDV — double-click any node for n8n's Node Details View: INPUT items |
//     a per-type Parameters form (+ a Settings tab: notes, retry on fail,
//     continue on fail, execute once) | OUTPUT items, an editable name, and
//     "Execute step" which runs the workflow UP TO that node. Edits persist
//     and change the simulation (flip the If operation and the branch flips).
//   • PAUSE / STEP / LOGS: a live run can be paused (freezes on the running
//     node), stepped one node at a time, continued, or reset; the bottom log
//     panel lists every executed node with status, items in→out and timing.
//   • Plus everything the page already proved: node-type cards, bottom-port
//     AI sub-nodes on dashed violet wires (they FLASH while their agent runs,
//     because in n8n the agent invokes them), labelled If branches,
//     connect-by-drag, a node palette.

// ---- palette / node-type catalogue ---------------------------------------
const PALETTE = {
  trigger: { glyph: '▶',  sub: 'Trigger' },
  http:    { glyph: '🌐', sub: 'HTTP Request' },
  set:     { glyph: '✏️', sub: 'Edit Fields' },
  code:    { glyph: '{}', sub: 'Code', mono: true },
  merge:   { glyph: '🔀', sub: 'Merge' },
  if:      { glyph: '⋔',  sub: 'If' },
  ai:      { glyph: '🤖', sub: 'AI Agent' },
  sheet:   { glyph: '📊', sub: 'Spreadsheet File' },
  notify:  { glyph: '🔔', sub: 'Send Message' },
};

// A node's HTML body: icon badge + title + type subtitle — the n8n card.
// opts.status paints the n8n execution language: st-pending dims the card,
// st-running adds the orange highlight + corner spinner, completed/error a
// corner badge; opts.flash is the AI sub-node "my agent is running" glow.
const card = (cat, glyph, title, sub, opts = {}) => ({
  tag: 'div',
  className: 'n8n-card cat-' + cat + (opts.dangling ? ' dangling' : '')
    + (opts.status && opts.status !== 'idle' ? ' st-' + opts.status : '')
    + (opts.flash ? ' st-flash' : ''),
  children: [
    { tag: 'div', className: 'n8n-badge' + (opts.mono ? ' mono' : ''), text: glyph },
    { tag: 'div', className: 'n8n-body', children: [
      { tag: 'div', className: 'n8n-title', text: title },
      { tag: 'div', className: 'n8n-sub', text: sub },
    ] },
    ...(opts.status === 'completed' ? [{ tag: 'div', className: 'n8n-status ok', text: '✓' }]
      : opts.status === 'error' ? [{ tag: 'div', className: 'n8n-status err', text: '!' }]

  metadata: { html: { content: card(cat, glyph, title, sub, opts), padding: 0 } },
  shape: { type: 'rect', fill: 'none', stroke: 'none' },

// A port pinned to an exact node-local pixel (the FK→PK / bottom-AI pattern).
// Labelled ports opt OUT of collision nudging: the nudger resolves along the
// vertical axis only, so three same-y bottom labels get scattered up/down —
// one onto the card, one onto its own wire. `noNudge` keeps the row uniform,
// and the `ai-port-label` class paints the canvas-halo that keeps the dashed
// wire from striking through the text (see the CSS above).
const absPort = (id, side, x, y, type, label) => ({
  id, side, type, shape: PORT,
  layout: { strategy: 'absolute', args: { units: 'px', x, y } },
  ...(label ? { label: { text: label, layout: 'outside', offset: 8, fontSize: 11, fontWeight: 600, noNudge: true, className: 'ai-port-label' } } : {}),
});

// The If node's condition, evaluated per ITEM the way n8n routes items.
const evalIf = (items, p) => {
  const key = (/\$json\.(\w+)/.exec(p.value1 || '') || [])[1];
  const val = (it) => (key ? it[key] : p.value1);
  const pass = (v) => {
    switch (p.operation) {
      case 'is true':   return v === true;
      case 'is false':  return v === false;
      case 'equals':    return String(v) === String(p.value2);
      case 'not equals': return String(v) !== String(p.value2);
      case 'larger':    return Number(v) > Number(p.value2);
      default:          return !!v;
    }
  };
  const t = [], f = [];
  for (const it of items) (pass(val(it)) ? t : f).push(it);
  return { t, f };
};

      for (const l of model.getLinks()) {
        if (!isMain(l) || srcOf(l) !== id) continue;
        setPill(l, b ? (b[l.sourcePortId] ?? []).length : d.output.length);
      }
    };
    ctx.pillsFrom = pillsFrom;
    const setEdgesRun = (id, on) => {
      for (const l of model.getLinks()) {
        if (!isMain(l) || tgtOf(l) !== id) continue;
        l.updateStyle({ ...styleFor(l), animation: on ? { type: 'flow', speed: 'fast', direction: 'forward' } : { type: 'none' } });
      }
    };
    // In n8n the agent INVOKES its sub-nodes: while it runs they flash and
    // their dashed wires animate; they never execute on the main walk.
    const setAgentFlash = (id, on) => {
      if (!/^agent$/.test(id)) return;
      for (const sid of ['model', 'memory', 'tool']) { on ? flash.add(sid) : flash.delete(sid); paintNode(sid); }
      for (const l of model.getLinks()) {
        if (isMain(l)) continue;
        l.updateStyle({ ...aiStyle(), animation: on ? { type: 'dash-flow', speed: 'fast', direction: 'forward' } : { type: 'none' } });
      }
    };

    // ---- painting: the card IS the status display (metadata.html re-render) --
    const paintNode = (id) => {
      const n = model.getNode(id), m = META[id];
      if (!n || !m) return;
      const st = RS.status.get(id) || 'idle';
      const dangling = id === 'slack' && !model.getLinks().some((l) => isMain(l) && tgtOf(l) === 'slack');
      n.setMetadata('html', {
        content: card(m.cat, m.glyph, titles[id] ?? id, dangling ? 'drag a wire to me' : m.sub,
          { mono: m.mono, dangling, status: st, flash: flash.has(id) }),
        padding: 0,
      });
    };
    const paintStatus = (id, st) => { RS.status.set(id, st); paintNode(id); };
    ctx.paintNode = paintNode; ctx.paintStatus = paintStatus;

    // ---- restyle any wire by the ports it joins (idempotent) -----------------
    ctx.restyleLinks = () => {
      for (const l of model.getLinks()) l.updateStyle(styleFor(l));
      paintNode('slack'); // once wired, the dashed "drag a wire to me" invite resolves
      api.renderNow();
    };
    api.on('connect', () => setTimeout(() => { ctx.restyleLinks(); ctx.updateHud(); }, 0));

    // ---- the execution log panel --------------------------------------------
    const setLogsOpen = (on) => {
      $id('runlog').hidden = !on;
      host.classList.toggle('logs-open', on);
      logsBtn.setAttribute('aria-pressed', String(on));
    };
    const setLogStatus = (text, cls) => { rlStatus.textContent = text; rlStatus.className = cls || ''; };
    const renderLog = () => {
      rlRows.innerHTML = RS.log.map((r) =>
        `<div class="rl-row"><span class="rl-dot${r.status === 'error' ? ' err' : ''}"></span>` +
        `<span class="rl-name">${escText(r.title)}</span><span class="rl-sub">${escText(r.sub)}</span>` +
        `<span>${r.nIn} → ${r.nOut} items</span><span class="rl-ms">${r.ms} ms${escText(r.note)}</span></div>`).join('');
      rlRows.scrollTop = rlRows.scrollHeight;
    };
    const pushLog = (id, status, ms, nIn, nOut, note = '') => {
      RS.log.push({ title: titles[id] ?? id, sub: (META[id] || {}).sub || '', status, ms, nIn, nOut, note });
      renderLog();
    };
    ctx.pushLog = pushLog; ctx.setLogsOpen = setLogsOpen; ctx.setLogStatus = setLogStatus; ctx.renderLog = renderLog;

    // ---- the walk: topological over MAIN edges, live from the model ----------
    // Recomputed per run so visitor edits (a drawn wire, a deleted node) are
    // honoured; upTo restricts to the ancestors of one node ("Execute step"),
    // exclusive=true stops just short of it ("Execute previous nodes").
    const buildWalk = (upTo = null, exclusive = false) => {
      const links = model.getLinks().filter(isMain);
      const out = new Map(), rin = new Map();
      for (const l of links) {
        const s = srcOf(l), t = tgtOf(l);
        if (!s || !t) continue;
        (out.get(s) ?? out.set(s, []).get(s)).push(t);
        (rin.get(t) ?? rin.set(t, []).get(t)).push(s);
      }
      const seen = new Set();
      const q = model.getNode('start') ? ['start'] : [];
      while (q.length) {
        const id = q.shift();
        if (seen.has(id)) continue;
        seen.add(id);
        for (const t of out.get(id) || []) q.push(t);
      }
      let keep = seen;
      if (upTo) {
        keep = new Set();
        const q2 = [upTo];
        while (q2.length) {
          const id = q2.shift();
          if (keep.has(id) || !seen.has(id)) continue;
          keep.add(id);
          for (const s of rin.get(id) || []) q2.push(s);
        }
        if (exclusive) keep.delete(upTo);
      }
      const deg = new Map();
      for (const id of keep) deg.set(id, 0);
      for (const l of links) {
        const s = srcOf(l), t = tgtOf(l);
        if (keep.has(s) && keep.has(t)) deg.set(t, deg.get(t) + 1);
      }
      const order = [], q3 = [...keep].filter((id) => deg.get(id) === 0);
      while (q3.length) {
        const id = q3.shift();
        order.push(id);
        for (const t of out.get(id) || []) {
          if (!keep.has(t)) continue;
          deg.set(t, deg.get(t) - 1);
          if (deg.get(t) === 0) q3.push(t);
        }
      }
      return order;
    };
    ctx.buildWalk = buildWalk;

    // Inputs = every executed upstream main edge's delivered items (the If
    // node delivers per-handle partitions — n8n routes items, not wires).
    const gatherInputs = (id) => {
      const items = [];
      for (const l of model.getLinks()) {
        if (!isMain(l) || tgtOf(l) !== id) continue;
        const up = srcOf(l);
        if (!up || !RS.data.has(up)) continue;
        const b = RS.branchOut.get(up);
        items.push(...(b ? (b[l.sourcePortId] ?? []) : RS.data.get(up).output));
      }
      return items;
    };

    // ---- the simulators: items in → items out, per node ----------------------
    const simOutput = (id, input) => {
      const p = PARAMS[id] || {};
      switch (id) {
        case 'start':       return [{ trigger: 'manual', run: RS.seq }];
        case 'login':       return [{ token: 'pams.7f3d1c', expiresIn: 3600 }];
        case 'setToken':    return input.map((it) => ({ ...it, authorization: 'Bearer pams.7f3d1c' }));
        case 'getBranches': return ['Cairo HQ', 'Alexandria', 'Giza Plant', 'Mansoura'].map((name, i) => ({ branchId: 101 + i, name }));
        case 'getVendors': {
          const pend = RS.seq % 2 === 1 ? 0 : 2;
          return [
            { vendorId: 'V-201', vendor: 'Nile Supplies', pendingInquiries: 0 },
            { vendorId: 'V-202', vendor: 'Delta Tools', pendingInquiries: pend },
            { vendorId: 'V-203', vendor: 'Suez Freight', pendingInquiries: 0 },
          ];
        }
        case 'store':       return input.map((it) => ({ ...it, storedAt: 'lookup_cache' }));
        case 'agent': {
          const open = input.reduce((n, it) => n + (it.pendingInquiries || 0), 0);
          return [{ verdict: open === 0 ? 'all inquiries resolved' : `${open} inquiries still open`, openInquiries: open, allDone: open === 0 }];
        }
        case 'excel':       return [{ file: p.file || 'summary.xlsx', rows: input.length, written: true }];
        case 'slack':       return [{ channel: p.channel || '#it-ops', sent: true }];
        default: break;
      }
      switch (KIND[id]) { // palette-added nodes get plausible kind defaults
        case 'http': return [{ status: 200, url: p.url }, { status: 200, page: 2 }];
        case 'ai':   return [{ response: 'ok' }];
        default:     return input.length ? input : [{}];
      }
    };

    // ---- the pause/step gate (the execute-flow pattern, verbatim semantics) --
    ctx.runActive = false;
    ctx.paused = false;
    ctx.runToken = 0;
    ctx.failArmed = false;
    let pauseWaiters = [];
    let pendingSteps = 0;
    let wakeSleep = null;
    const gateSleep = (ms) => new Promise((res) => {
      const t = setTimeout(() => { wakeSleep = null; res(); }, ms);
      wakeSleep = () => { clearTimeout(t); wakeSleep = null; res(); };
    });
    const pokeGate = () => { if (wakeSleep) wakeSleep(); };
    const releaseGate = (all) => {
      if (all) {
        pendingSteps = 0;
        for (const res of pauseWaiters.splice(0)) res();
        return;
      }
      const parked = pauseWaiters.splice(0, 1);
      if (parked.length) parked[0]();
      else { pendingSteps += 1; pokeGate(); }
    };
    const stepGate = async (stepMs) => {
      if (!ctx.paused) await gateSleep(stepMs);
      if (!ctx.paused) return;
      if (pendingSteps > 0) { pendingSteps -= 1; return; }
      await new Promise((res) => pauseWaiters.push(res));
    };
    const syncButtons = () => {
      btnRun.disabled = ctx.runActive;
      pauseBtn.disabled = !ctx.runActive;
      pauseBtn.textContent = ctx.paused ? '▶ continue' : '⏸ pause';
      stepBtn.disabled = ctx.runActive && !ctx.paused;
      const ex = $id('ndv-exec');
      if (ex) ex.disabled = ctx.runActive;
    };
    ctx.setPaused = (on) => {
      if (!ctx.runActive) return;
      ctx.paused = on;
      syncButtons();
      const held = RS.running;
      if (on) readout.textContent = `paused at: ${held ? titles[held] : '—'} — ▶ continue or step ▸`;
      else {
        if (held) readout.textContent = `running: ${titles[held]}`;
        releaseGate(true);
      }
    };

    ctx.reset = () => {
      ctx.runToken += 1;
      ctx.paused = false;
      ctx.runActive = false;
      syncButtons();
      releaseGate(true);
      pokeGate();
      RS.status.clear(); RS.data.clear(); RS.branchOut.clear();
      RS.executed = []; RS.log = []; RS.running = null;
      flash.clear();
      for (const id of Object.keys(META)) paintNode(id);
      for (const l of model.getLinks()) {
        clearPill(l);
        l.updateStyle({ ...styleFor(l), animation: { type: 'none' } });
      }
      renderLog();
      setLogStatus('idle', '');
      readout.textContent = 'idle';
      api.renderNow();
      if (ndvOpenId) refreshNDVData();
    };

    /**
     * THE EXECUTOR — walks the live graph topologically from the trigger,
     * flows simulated items edge-to-edge, and drives every n8n affordance:
     * spinner (running), green check (completed), red badge (error, halts),
     * item-count pills, the log panel, the AI sub-node flash. upTo/exclusive
     * are the NDV's partial executions; startPaused is idle "step ▸".
     */
    ctx.execute = async ({ stepMs = 480, upTo = null, exclusive = false, startPaused = false } = {}) => {
      ctx.reset();
      const token = ctx.runToken;
      RS.seq += 1;
      ctx.runActive = true;
      ctx.paused = !!startPaused;
      syncButtons();
      setLogsOpen(true);
      setLogStatus('Running…', '');
      try {
        const walk = buildWalk(upTo, exclusive);
        if (!walk.length) {
          readout.textContent = upTo ? 'not connected to the trigger' : 'no trigger node';
          setLogStatus(readout.textContent, 'err');
          return { executed: [], failed: null, aborted: false };
        }
        for (const id of walk) if (model.getNode(id)) paintStatus(id, 'pending');
        api.renderNow();

        let failedAt = null, totalMs = 0;
        for (const id of walk) {
          if (!model.getNode(id)) continue; // deleted mid-run — skip, never throw
          const hasIncoming = model.getLinks().some((l) => isMain(l) && tgtOf(l) === id);
          const input = gatherInputs(id);
          // n8n only runs a node that received items (an untaken If branch
          // starves its downstream); triggers have no input by design.
          if (hasIncoming && input.length === 0) continue;

          RS.running = id;
          paintStatus(id, 'running');
          setEdgesRun(id, true);
          setAgentFlash(id, true);
          readout.textContent = ctx.paused ? `paused at: ${titles[id]} — ▶ continue or step ▸` : `running: ${titles[id]}`;
          api.renderNow();
          await stepGate(stepMs);
          if (token !== ctx.runToken) return { executed: [], failed: null, aborted: true };
          if (ctx.paused) readout.textContent = `paused at: ${titles[id]} — ▶ continue or step ▸`;

          const s = SETTINGS[id] || defSettings();
          const inWork = s.executeOnce ? input.slice(0, 1) : input;
          let failing = ctx.failArmed && id === 'getVendors';
          let ms = SIM_MS[id] ?? 45, note = '', status = 'completed', output;
          if (failing && s.retryOnFail) { failing = false; ms = ms * 2 + 210; note = ' · retried ×1'; }
          if (failing) {
            status = 'error';
            output = s.continueOnFail ? [{ error: 'PAMS vendor API: 502 Bad Gateway' }] : [];
            if (s.continueOnFail) note = ' · continued';
            else failedAt = id;
          } else {
            output = simOutput(id, inWork);
          }
          if (id === 'ifNode' && status === 'completed') {
            const parts = evalIf(output, PARAMS.ifNode || {});
            RS.branchOut.set(id, { if_true: parts.t, if_false: parts.f });
          }
          RS.data.set(id, { input: inWork, output, ms });
          RS.executed.push(id);
          totalMs += ms;

          setEdgesRun(id, false);
          setAgentFlash(id, false);
          paintStatus(id, status);
          pillsFrom(id);
          pushLog(id, status, ms, inWork.length, output.length, note);
          api.renderNow();
          if (failedAt) break;
        }
        RS.running = null;
        for (const id of walk) if (RS.status.get(id) === 'pending') paintStatus(id, 'idle');
        const secs = (totalMs / 1000).toFixed(2);
        if (failedAt) {
          readout.textContent = `✗ failed at: ${titles[failedAt]} — downstream never ran`;
          setLogStatus(`Error after ${secs}s — halted at ${titles[failedAt]}`, 'err');
        } else {
          readout.textContent = upTo ? `✓ ran up to: ${titles[upTo] ?? upTo}` : '✓ workflow ran successfully';
          setLogStatus(`Success in ${secs}s · ${RS.executed.length} nodes`, 'ok');
        }
        api.renderNow();
        if (ndvOpenId) refreshNDVData();
        return { executed: [...RS.executed], failed: failedAt, aborted: false };
      } finally {
        if (token === ctx.runToken) {
          ctx.runActive = false;
          ctx.paused = false;
          RS.running = null;
          syncButtons();
        }
      }
    };

    // ---- run-bar wiring ------------------------------------------------------
    btnRun.addEventListener('click', () => { if (!ctx.runActive) ctx.execute(); });
    pauseBtn.addEventListener('click', () => ctx.setPaused(!ctx.paused));
    stepBtn.addEventListener('click', () => {
      if (ctx.runActive && ctx.paused) releaseGate(false);
      else if (!ctx.runActive) ctx.execute({ startPaused: true, stepMs: 250 });
    });
    $id('btn-reset').addEventListener('click', () => ctx.reset());
    logsBtn.addEventListener('click', () => setLogsOpen($id('runlog').hidden));
    $id('rl-close').addEventListener('click', () => setLogsOpen(false));
    failBtn.addEventListener('click', () => {
      ctx.failArmed = !ctx.failArmed;
      failBtn.setAttribute('aria-pressed', String(ctx.failArmed));
    });

    // ---- the NDV (Node Details View): input | parameters/settings | output --
    let ndvOpenId = null;
    const kindLabel = { trigger: 'Trigger', http: 'HTTP Request', set: 'Edit Fields', code: 'Code',
      merge: 'Merge', if: 'If', ai: 'AI Agent', 'ai-model': 'Chat Model', 'ai-memory': 'Memory',
      'ai-tool': 'Tool', sheet: 'Spreadsheet File', noop: 'No-Op', notify: 'Send Message' };
    const CAT_BG = { trigger: '#10b981', http: '#0ea5e9', set: '#6366f1', code: '#475569',
      merge: '#06b6d4', if: '#f97316', ai: '#8b5cf6', sheet: '#22a565', notify: '#ec4899' };

    const fieldWrap = (labelTxt, ctrl) => {
      const w = document.createElement('div');
      w.className = 'ndv-field';
      const lb = document.createElement('label');
      lb.textContent = labelTxt;
      w.append(lb, ctrl);
      return w;
    };
    // Controls WRITE into PARAMS as you type — the n8n "edits persist" contract
    // (in-page state; closing and reopening the NDV shows what you left).
    const bindText = (id, key, type = 'text') => {
      const inp = document.createElement(type === 'textarea' ? 'textarea' : 'input');
      if (type !== 'textarea') inp.type = type;
      inp.value = PARAMS[id][key] ?? '';
      inp.dataset.param = key;
      inp.addEventListener('input', () => { PARAMS[id][key] = type === 'number' ? Number(inp.value) : inp.value; });
      return inp;
    };
    const bindSelect = (id, key, options) => {
      const sel = document.createElement('select');
      sel.dataset.param = key;
      for (const o of options) {
        const op = document.createElement('option');
        op.value = o; op.textContent = o;
        sel.append(op);
      }
      sel.value = PARAMS[id][key] ?? options[0];
      sel.addEventListener('change', () => { PARAMS[id][key] = sel.value; });
      return sel;
    };

    // The per-type Parameters form — the n8n NDV centre pane.
    const renderParams = (id) => {
      const box = $id('ndv-params');
      box.innerHTML = '';
      const p = PARAMS[id] || {};
      const add = (el) => box.append(el);
      switch (KIND[id]) {
        case 'trigger': {
          const note = document.createElement('p');
          note.className = 'ndv-note';
          note.textContent = 'When you press "▶ Test workflow", this trigger emits one item and the run begins. Triggers have no parameters here.';
          add(note);
          break;
        }
        case 'http':
          add(fieldWrap('Method', bindSelect(id, 'method', ['GET', 'POST', 'PUT', 'DELETE'])));
          add(fieldWrap('URL', bindText(id, 'url')));
          add(fieldWrap('Authentication', bindSelect(id, 'auth', ['None', 'Basic Auth', 'Header Auth', 'Bearer Token'])));
          break;
        case 'set': {
          const head = document.createElement('div');
          head.className = 'ndv-field';
          const lb = document.createElement('label');
          lb.textContent = 'Fields to set (name = value)';
          head.append(lb);
          add(head);
          (p.fields || []).forEach((f, i) => {
            const row = document.createElement('div');
            row.className = 'ndv-kv';
            const nm = document.createElement('input');
            nm.type = 'text'; nm.value = f.name; nm.dataset.param = 'field-name-' + i;
            nm.addEventListener('input', () => { f.name = nm.value; });
            const vl = document.createElement('input');
            vl.type = 'text'; vl.value = f.value; vl.dataset.param = 'field-value-' + i;
            vl.addEventListener('input', () => { f.value = vl.value; });
            row.append(nm, vl);
            add(row);
          });
          const btn = document.createElement('button');
          btn.className = 'ndv-add';
          btn.textContent = '+ Add field';
          btn.addEventListener('click', () => { p.fields.push({ name: 'field_' + (p.fields.length + 1), value: '' }); renderParams(id); });
          add(btn);
          break;
        }
        case 'code': {
          add(fieldWrap('Mode', bindSelect(id, 'mode', ['Run Once for All Items', 'Run Once for Each Item'])));
          const t = bindText(id, 'code', 'textarea');
          t.className = 'code';
          add(fieldWrap('JavaScript', t));
          break;
        }
        case 'merge':
          add(fieldWrap('Mode', bindSelect(id, 'mode', ['Append', 'Combine', 'Choose Branch'])));
          add(fieldWrap('Number of inputs', bindText(id, 'inputs', 'number')));
          break;
        case 'if':
          add(fieldWrap('Value 1', bindText(id, 'value1')));
          add(fieldWrap('Operation', bindSelect(id, 'operation', ['is true', 'is false', 'equals', 'not equals', 'larger'])));
          add(fieldWrap('Value 2', bindText(id, 'value2')));
          break;
        case 'ai':
          add(fieldWrap('Prompt (system message)', bindText(id, 'prompt', 'textarea')));
          add(fieldWrap('Model', bindSelect(id, 'model', ['gpt-5.5', 'gpt-4.1', 'o4-mini'])));
          add(fieldWrap('Temperature', bindText(id, 'temperature', 'number')));
          break;
        case 'ai-model':
          add(fieldWrap('Deployment', bindText(id, 'deployment')));
          add(fieldWrap('API version', bindText(id, 'apiVersion')));
          break;
        case 'ai-memory':
          add(fieldWrap('Collection', bindText(id, 'collection')));
          add(fieldWrap('Context window', bindText(id, 'contextWindow', 'number')));
          break;
        case 'ai-tool':
          add(fieldWrap('Tool description', bindText(id, 'description', 'textarea')));
          break;
        case 'sheet':
          add(fieldWrap('Operation', bindSelect(id, 'operation', ['Write to file', 'Append to file'])));
          add(fieldWrap('File name', bindText(id, 'file')));
          break;
        case 'noop':
          add(fieldWrap('Wait amount', bindText(id, 'amount', 'number')));
          add(fieldWrap('Unit', bindSelect(id, 'unit', ['seconds', 'minutes', 'hours'])));
          break;
        case 'notify':
          add(fieldWrap('Channel', bindText(id, 'channel')));
          add(fieldWrap('Message', bindText(id, 'text', 'textarea')));
          break;
        default: {
          const note = document.createElement('p');
          note.className = 'ndv-note';
          note.textContent = 'This node has no parameters.';
          add(note);
        }
      }
    };
    // The Settings tab: n8n's node settings that actually STEER the simulator.
    const renderSettings = (id) => {
      const box = $id('ndv-settings');
      box.innerHTML = '';
      const s = SETTINGS[id];
      const chk = (key, label) => {
        const w = document.createElement('label');
        w.className = 'ndv-check';
        const c = document.createElement('input');
        c.type = 'checkbox';
        c.checked = !!s[key];
        c.dataset.set = key;
        c.addEventListener('change', () => { s[key] = c.checked; });
        const sp = document.createElement('span');
        sp.textContent = label;
        w.append(c, sp);
        return w;
      };
      box.append(chk('retryOnFail', 'Retry on fail — one retry, then give up'));
      box.append(chk('continueOnFail', 'Continue on fail — pass the error item downstream'));
      box.append(chk('executeOnce', 'Execute once — consume only the first input item'));
      const t = document.createElement('textarea');
      t.value = s.notes;
      t.dataset.set = 'notes';
      t.addEventListener('input', () => { s.notes = t.value; });
      box.append(fieldWrap('Notes', t));
    };
    // The data panes. Input shows what the node consumed last run — or, before
    // it ever ran, what its upstream would hand it — or n8n's "execute previous
    // nodes" affordance when there is no data at all.
    const renderPane = (which) => {
      const id = ndvOpenId;
      const box = $id(which === 'input' ? 'ndv-input' : 'ndv-output');
      const cnt = $id(which === 'input' ? 'ndv-in-count' : 'ndv-out-count');
      box.innerHTML = '';
      cnt.textContent = '';
      if (!id) return;
      if (['ai-model', 'ai-memory', 'ai-tool'].includes(KIND[id])) {
        const h = document.createElement('div');
        h.className = 'ndv-hint';
        h.textContent = which === 'input'
          ? 'This sub-node is invoked BY its AI Agent while the agent step runs — it takes no items of its own.'
          : "Sub-nodes produce no items; they answer the agent's calls.";
        box.append(h);
        return;
      }
      const d = RS.data.get(id);
      let items = d ? d[which] : null;
      if (!items && which === 'input') {
        const fromUpstream = gatherInputs(id);
        if (fromUpstream.length) items = fromUpstream;
      }
      if (!items) {
        const h = document.createElement('div');
        h.className = 'ndv-hint';
        if (which === 'output') {
          h.textContent = 'No output data yet — press "▶ Execute step" above to run up to this node.';
        } else if (KIND[id] === 'trigger') {
          h.textContent = 'The trigger starts the run — it consumes no input items.';
        } else if (!model.getLinks().some((l) => isMain(l) && tgtOf(l) === id)) {
          h.textContent = 'Wire an input into this node first — it has no incoming connection.';
        } else {
          h.textContent = 'No input data yet.';
          const b = document.createElement('button');
          b.textContent = '▶ Execute previous nodes';
          b.addEventListener('click', () => { if (!ctx.runActive) ctx.execute({ upTo: id, exclusive: true, stepMs: 140 }); });
          h.append(b);
        }
        box.append(h);
        return;
      }
      cnt.textContent = `${items.length} item${items.length === 1 ? '' : 's'}`;
      for (const it of items) {
        const w = document.createElement('div');
        w.className = 'ndv-item';
        const pre = document.createElement('pre');
        pre.textContent = JSON.stringify(it, null, 1);
        w.append(pre);
        box.append(w);
      }
    };
    const refreshNDVData = () => { renderPane('input'); renderPane('output'); };

    ctx.openNDV = (id) => {
      if (!META[id] || !model.getNode(id)) return;
      ndvOpenId = id;
      const m = META[id];
      $id('ndv-badge').textContent = m.glyph;
      $id('ndv-badge').style.background = CAT_BG[m.cat] || '#667';
      $id('ndv-name').value = titles[id] ?? id;
      $id('ndv-kind').textContent = kindLabel[KIND[id]] || m.sub;
      for (const tb of ndvEl.querySelectorAll('.ndv-tab')) tb.classList.toggle('on', tb.dataset.tab === 'params');
      $id('ndv-params').style.display = '';
      $id('ndv-settings').style.display = 'none';
      renderParams(id);
      renderSettings(id);
      refreshNDVData();
      syncButtons();
      ndvEl.hidden = false;
    };
    ctx.closeNDV = () => { ndvOpenId = null; ndvEl.hidden = true; };
    $id('ndv-close').addEventListener('click', () => ctx.closeNDV());
    ndvEl.querySelector('.ndv-back').addEventListener('click', () => ctx.closeNDV());
    window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !ndvEl.hidden) ctx.closeNDV(); });
    // Renaming in the header renames the card on the canvas, live.
    $id('ndv-name').addEventListener('input', () => {
      if (!ndvOpenId) return;
      titles[ndvOpenId] = $id('ndv-name').value;
      paintNode(ndvOpenId);
      api.renderNow();
    });
    // n8n's "Execute step": run the workflow UP TO and including this node.
    $id('ndv-exec').addEventListener('click', () => {
      if (ndvOpenId && !ctx.runActive) ctx.execute({ upTo: ndvOpenId, stepMs: 140 });
    });
    for (const tb of ndvEl.querySelectorAll('.ndv-tab')) {
      tb.addEventListener('click', () => {
        for (const o of ndvEl.querySelectorAll('.ndv-tab')) o.classList.toggle('on', o === tb);
        $id('ndv-params').style.display = tb.dataset.tab === 'params' ? '' : 'none';
        $id('ndv-settings').style.display = tb.dataset.tab === 'settings' ? '' : 'none';
      });
    }
    // Double-click a node card → its NDV (the n8n gesture). Model-space hit
    // test, so it works for real pointers and synthetic dispatch alike.
    host.addEventListener('dblclick', (e) => {
      const w = api.viewport.clientToWorld(e.clientX, e.clientY, host.getBoundingClientRect());
      const hit = model.getNodes().find((n) =>
        w.x >= n.position.x && w.x <= n.position.x + n.size.width &&
        w.y >= n.position.y && w.y <= n.position.y + n.size.height);
      if (hit) ctx.openNDV(hit.id);
    });

    // ---- palette: click a chip → drop a fresh, fully-registered node --------
    let added = 0;
    ctx.addNode = async (kind) => {
      const meta = PALETTE[kind];
      const x = 60 + (added % 3) * 46, y = 470 + Math.floor(added / 3) * 24;
      added++;
      const node = await engine.addNode({ type: 'rect', position: { x, y }, size: { width: 200, height: 64 } });
      node.setMetadata('shape', { type: 'rect', fill: 'none', stroke: 'none' });
      // Register it as a first-class citizen: it gets an NDV, params, a sim.
      KIND[node.id] = kind;
      META[node.id] = { cat: kind, glyph: meta.glyph, sub: meta.sub, mono: meta.mono };
      titles[node.id] = meta.sub;
      PARAMS[node.id] = (DEFAULT_PARAMS[kind] || (() => ({})))(node.id);
      SETTINGS[node.id] = defSettings();
      paintNode(node.id);
      api.renderNow();
      ctx.updateHud();
      return node;
    };
    for (const btn of document.querySelectorAll('.pal-item'))
      btn.addEventListener('click', () => ctx.addNode(btn.dataset.kind));

    // internals the showcase stages directly (deterministic money shot)
    ctx.setAgentFlash = setAgentFlash;
    ctx.setEdgesRun = setEdgesRun;

    await ctx.tick();
  },

  // Money shot: the run held mid-flight at the AI Agent — everything upstream
  // green-checked with item-count pills on the wires, the Agent spinning with
  // its three sub-nodes flashing violet on animated dashed wires, downstream
  // dimmed pending, and the execution log open on the rows so far. Staged
  // directly (not timed) so the frame is deterministic for the pixel gate.
  async showcase(ctx) {
    ctx.reset();
    const RS = ctx.RS;
    const outCounts = { start: 1, login: 1, setToken: 1, getBranches: 4, getVendors: 3, merge: 7, store: 7 };
    const inCounts = { start: 0, login: 1, setToken: 1, getBranches: 1, getVendors: 1, merge: 7, store: 7 };
    const SIM_MS_LOCAL = { start: 3, login: 341, setToken: 12, getBranches: 512, getVendors: 387, merge: 24, store: 56 };
    for (const [id, n] of Object.entries(outCounts)) {
      RS.data.set(id, { input: [], output: Array.from({ length: n }, () => ({})), ms: SIM_MS_LOCAL[id] });
      RS.executed.push(id);
      ctx.paintStatus(id, 'completed');
      ctx.pillsFrom(id);
      ctx.pushLog(id, 'completed', SIM_MS_LOCAL[id], inCounts[id], n);
    }
    ctx.paintStatus('agent', 'running');
    ctx.RS.running = 'agent';
    ctx.setEdgesRun('agent', true);
    ctx.setAgentFlash('agent', true);
    for (const id of ['ifNode', 'excel', 'wait']) ctx.paintStatus(id, 'pending');
    ctx.setLogsOpen(true);
    ctx.setLogStatus('Running…', '');
    document.getElementById('run-readout').textContent = 'running: AI Quality Agent';
    ctx.instance.renderNow();
    // Frame the action: merge→store→AGENT(spinning)→if→branches with the
    // sub-node flash, shifted up so the open log panel doesn't cover it.
    ctx.centerView(1495, 450, 0.62);
  },

  async assert(ctx) {
    const host = ctx.host, model = ctx.diagram, api = ctx.instance;

    // Bring every node on-screen so glyph-based (port) checks can find their
    // elements — off-screen nodes are culled from the DOM.
    api.fitView(50); api.renderNow(); await ctx.tick();

    // Normalize boot state (a gate re-run inside one page must not inherit a
    // twiddled panel): no run, no NDV, logs closed, failure disarmed.
    ctx.reset();
    ctx.closeNDV();
    ctx.setLogsOpen(false);
    const failBtn = document.getElementById('btn-fail');
    if (failBtn.getAttribute('aria-pressed') === 'true') failBtn.click();

    const linkPath = (id) => host.querySelector(`[data-link-id="${id}"] path.diagram-link`);
    const strokeOf = (id) => { const p = linkPath(id); return p ? getComputedStyle(p).stroke : ''; };
    const dashOf   = (id) => { const p = linkPath(id); return p ? getComputedStyle(p).strokeDasharray : ''; };
    const portC = (portId) => { const el = host.querySelector(`[data-port-id="${portId}"]`); if (!el) return null; const r = el.getBoundingClientRect(); return { x: r.left + r.width / 2, y: r.top + r.height / 2 }; };
    const portsOf = (id) => { const ps = model.getNode(id).getPorts(); return Array.isArray(ps) ? ps : [...ps.values()]; };
    const cardEl = (id) => host.querySelector(`[data-node-id="${id}"] .n8n-card`);
    const linkText = (id) => host.querySelector(`[data-link-id="${id}"]`)?.textContent || '';
    const until = async (cond, what) => {
      for (let i = 0; i < 400 && !cond(); i++) await new Promise((r) => setTimeout(r, 10));
      check(cond(), `timed out waiting for ${what}`);
    };
    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

    // 1. NODE-TYPE VARIETY — the canvas carries the distinct n8n node families,
    //    each an HTML card with its own accent class.
    const cats = ['trigger', 'http', 'set', 'code', 'merge', 'if', 'ai', 'sheet', 'notify'];
    const present = cats.filter((c) => host.querySelector(`.n8n-card.cat-${c}`));
    check(present.length >= 8, `expected the n8n node-type variety (>=8 families), got ${present.length}: [${present}]`);
    check(host.querySelectorAll('.n8n-card.cat-ai').length === 4, `the AI cluster should be 4 violet cards, got ${host.querySelectorAll('.n8n-card.cat-ai').length}`);
    const trig = cardEl('start');
    const pill = parseFloat(getComputedStyle(trig).borderTopLeftRadius);
    check(pill >= 20, `the trigger card should be a left-rounded pill (border-radius>=20), got ${pill}`);
    const httpBadge = host.querySelector('[data-node-id="login"] .n8n-badge');
    check(getComputedStyle(httpBadge).backgroundColor === 'rgb(14, 165, 233)', `the HTTP icon badge should paint its accent colour, got ${getComputedStyle(httpBadge).backgroundColor}`);

    // 2. TWO LINE FAMILIES are genuinely distinct: main = solid gray, AI = dashed violet.
    const mainDash = dashOf('e_start_login'), aiDash = dashOf('ai_model');
    const mainCol = strokeOf('e_start_login'), aiCol = strokeOf('ai_model');
    check(mainDash === 'none', `a main wire must be solid (dash=none), got "${mainDash}"`);
    check(aiDash && aiDash !== 'none', `an AI wire must be dashed, got "${aiDash}"`);
    check(aiCol !== mainCol, `the AI wire colour must differ from the main wire (ai=${aiCol}, main=${mainCol})`);
    const agentRect = cardEl('agent').getBoundingClientRect();
    const agentMidY = agentRect.top + agentRect.height / 2;
    for (const pid of ['agent_model', 'agent_memory', 'agent_tool']) {
      const pc = portC(pid);
      check(pc && pc.y > agentMidY, `AI dock port ${pid} must sit on the BOTTOM of the agent, y=${pc && pc.y.toFixed(0)} vs mid ${agentMidY.toFixed(0)}`);
    }
    check(['ai_model', 'ai_memory', 'ai_tool'].every((id) => linkPath(id)), 'all three AI sub-node wires should render');

    // 3. The IF node is a BRANCH node: two labelled, colour-coded outputs.
    const ifOuts = portsOf('ifNode').filter((p) => p.type === 'output');
    check(ifOuts.length === 2, `the If node must have 2 outputs (true/false), got ${ifOuts.length}`);
    check(!!linkPath('if_true_excel') && !!linkPath('if_false_wait'), 'both If branches should render a wire');
    check(strokeOf('if_true_excel') !== strokeOf('if_false_wait'), 'the true/false branches must be colour-coded differently');
    check(/true/i.test(linkText('if_true_excel')), `the true branch should be labelled "true", DOM text was "${linkText('if_true_excel')}"`);
    check(/false/i.test(linkText('if_false_wait')), `the false branch should be labelled "false", DOM text was "${linkText('if_false_wait')}"`);

    // 4. CONNECT-BY-DRAG actually wires a new edge, with a real pointer gesture.
    let btnDown = false;
    const fireP = (type, x, y) => {
      if (type === 'pointerdown') btnDown = true;
      const buttons = type === 'pointerup' ? 0 : (type === 'pointerdown' ? 1 : (btnDown ? 1 : 0));
      if (type === 'pointerup') btnDown = false;
      host.dispatchEvent(new PointerEvent(type, { clientX: x, clientY: y, bubbles: true, cancelable: true, button: 0, buttons, pointerId: 1, pointerType: 'mouse' }));
    };
    const dragTo = async (fromPort, x, y) => {
      const a = portC(fromPort);
      fireP('pointermove', a.x, a.y); fireP('pointerdown', a.x, a.y);
      fireP('pointermove', (a.x + x) / 2, (a.y + y) / 2); fireP('pointermove', x, y);
      fireP('pointerup', x, y);
      await new Promise((r) => setTimeout(r, 0)); await ctx.tick();
    };
    const joins = (l, a, b) => {
      const s = model.getNodeByPortId(l.sourcePortId)?.id, t = model.getNodeByPortId(l.targetPortId)?.id;
      return (s === a && t === b) || (s === b && t === a);
    };
    check(!model.getLinks().some((l) => joins(l, 'excel', 'slack')), 'precondition: Write Summary → Send Slack Alert should start UNWIRED (the dangling node)');
    const before = model.getLinks().length;
    const target = portC('slack_in');
    await dragTo('excel_out', target.x, target.y);
    check(model.getLinks().length === before + 1, `connect-by-drag should add exactly one wire (was ${before}, now ${model.getLinks().length})`);
    const made = model.getLinks().find((l) => joins(l, 'excel', 'slack'));
    check(!!made, 'the drawn wire should join Write Summary → Send Slack Alert');

    // 4b. TEETH — a release on EMPTY canvas connects nothing.
    const before2 = model.getLinks().length;
    const r = host.getBoundingClientRect();
    await dragTo('excel_out', r.left + 24, r.top + 24); // top-left corner is empty at fit
    check(model.getLinks().length === before2, `a release on empty canvas must not connect (links ${before2}→${model.getLinks().length})`);
    // Restore the dangling node for the gallery frame.
    model.removeLink(made.id); ctx.restyleLinks(); api.renderNow();
    check(!model.getLinks().some((l) => joins(l, 'excel', 'slack')), 'restore: Send Slack Alert is dangling again');

    // 5. MUTATION PROOF (wire families) — the two line families are distinct by
    //    DESIGN, not luck: repaint an AI wire solid-gray and the checks go red.
    const ai = model.getLink('ai_model');
    ai.updateStyle({ stroke: MAIN, strokeDasharray: undefined }); api.renderNow();
    check(dashOf('ai_model') === 'none', 'MUTATION: with its dash removed the AI wire is now (wrongly) solid — the dash check has teeth');
    check(strokeOf('ai_model') === strokeOf('e_start_login'), 'MUTATION: recoloured to main-gray, the AI wire is now indistinguishable from a main wire — the distinction check has teeth');
    ai.updateStyle(aiStyle()); api.renderNow();
    check(dashOf('ai_model') !== 'none', 'restore: the AI wire is dashed again');
    check(strokeOf('ai_model') !== strokeOf('e_start_login'), 'restore: the AI wire is visually distinct again');

    // ================== THE EXECUTION SIMULATION ==================
    const RS = ctx.RS;

    // 6. FULL RUN — topological, item-flowing, with live n8n affordances.
    const run6 = ctx.execute({ stepMs: 90 });
    await until(() => RS.running === 'login', 'the run to reach Login (running)');
    check(cardEl('login').classList.contains('st-running'), 'the executing node must paint the st-running highlight');
    check(!!host.querySelector('[data-node-id="login"] .n8n-spin'), 'the executing node must show the corner SPINNER');
    check(host.querySelectorAll('#canvas .n8n-spin').length === 1, 'exactly ONE node may spin at a time');
    check([...RS.status.values()].filter((s) => s === 'running').length === 1, 'exactly one node may hold status running');
    const runCls = host.querySelector('[data-link-id="e_start_login"] .diagram-link')?.getAttribute('class') || '';
    check(runCls.includes('link-animated-'), `the executing node's incoming wire must animate, got "${runCls}"`);
    check(cardEl('start').classList.contains('st-completed'), 'the finished trigger must paint st-completed');
    check(!!host.querySelector('[data-node-id="start"] .n8n-status.ok'), 'the finished trigger must carry the green ✓ badge');
    check(cardEl('agent').classList.contains('st-pending'), 'downstream nodes must dim as pending during the run');
    check(!document.getElementById('runlog').hidden, 'starting a run must open the execution log (n8n opens its logs view)');
    const r6 = await run6;
    check(r6.failed === null && !r6.aborted, 'the happy-path run must finish clean');
    const allDone6 = RS.data.get('agent').output[0].allDone;
    const tail6 = allDone6 ? 'excel' : 'wait';
    const expected6 = ['start', 'login', 'setToken', 'getBranches', 'getVendors', 'merge', 'store', 'agent', 'ifNode', tail6];
    check(JSON.stringify(r6.executed) === JSON.stringify(expected6),
      `the run must execute the reachable main path in TOPOLOGICAL order\n    expected: ${JSON.stringify(expected6)}\n    actual:   ${JSON.stringify(r6.executed)}`);
    for (const id of expected6) {
      check(RS.status.get(id) === 'completed', `${id} should be completed, is ${RS.status.get(id)}`);
      check(cardEl(id).classList.contains('st-completed'), `${id} should paint st-completed`);
      check(!!host.querySelector(`[data-node-id="${id}"] .n8n-status.ok`), `${id} should carry the ✓ badge`);
    }
    const untaken6 = tail6 === 'excel' ? 'wait' : 'excel';
    check((RS.status.get(untaken6) ?? 'idle') === 'idle', `the untaken If branch (${untaken6}) must stay IDLE, is ${RS.status.get(untaken6)}`);
    check(!host.querySelector(`[data-node-id="${untaken6}"] .n8n-status.ok`), 'the untaken branch node must carry no ✓ badge');
    check((RS.status.get('model') ?? 'idle') === 'idle', 'AI sub-nodes never execute on the main walk (the agent invokes them)');
    // Item-count pills on every wire that carried data — n8n's "n items".
    const pills = [
      ['e_start_login', '1 item'], ['e_login_set', '1 item'], ['e_set_branches', '1 item'],
      ['e_set_vendors', '1 item'], ['e_branches_merge', '4 items'], ['e_vendors_merge', '3 items'],
      ['e_merge_store', '7 items'], ['e_store_agent', '7 items'], ['e_agent_if', '1 item'],
    ];
    for (const [lid, txt] of pills) {
      check(linkText(lid).includes(txt), `wire ${lid} must show its item-count pill "${txt}", DOM text was "${linkText(lid)}"`);
    }
    // LABEL LEGIBILITY — every pill is an n8n-style OPAQUE chip: a solid
    // background rect sits under the text, so the wire passes BEHIND the pill
    // instead of striking through (or kissing the edge of) the glyphs.
    const pillChip = (lid) => {
      const bg = host.querySelector(`[data-link-id="${lid}"] .link-label-bg`);
      if (!bg) return false;
      const f = getComputedStyle(bg).fill;
      return f !== 'none' && !/rgba\(.*,\s*0\)$/.test(f);
    };
    for (const [lid] of pills) check(pillChip(lid), `wire ${lid}'s pill must be an opaque chip (solid background rect)`);
    // …and the AI port labels (Model/Memory/Tool) carry the canvas-coloured
    // text halo that keeps their dashed wires from striking through.
    const halo = host.querySelector('text.ai-port-label');
    check(!!halo, 'the AI port labels must carry the ai-port-label halo class');
    const hs = halo && getComputedStyle(halo);
    check(!!hs && hs.paintOrder.includes('stroke') && hs.stroke !== 'none' && parseFloat(hs.strokeWidth) >= 3,
      `the AI port labels must paint a text halo (paint-order:stroke over the canvas colour), got paint-order="${hs && hs.paintOrder}" stroke="${hs && hs.stroke}" stroke-width=${hs && hs.strokeWidth}`);
    const takenEdge = tail6 === 'excel' ? 'if_true_excel' : 'if_false_wait';
    const untakenEdge = tail6 === 'excel' ? 'if_false_wait' : 'if_true_excel';
    check(linkText(takenEdge).includes('1 item'), `the taken If branch must show its pill, got "${linkText(takenEdge)}"`);
    check(!/item/.test(linkText(untakenEdge)), `the untaken If branch must show NO item pill, got "${linkText(untakenEdge)}"`);
    // The execution log: one row per executed node, in order, with in→out counts.
    check(RS.log.length === r6.executed.length, `the log must hold one row per executed node (${r6.executed.length}), got ${RS.log.length}`);
    check(document.querySelectorAll('#rl-rows .rl-row').length === r6.executed.length, 'the log PANEL must render every row');
    RS.log.forEach((row, i) => {
      const d = RS.data.get(r6.executed[i]);
      check(row.nIn === d.input.length && row.nOut === d.output.length,
        `log row ${i} (${row.title}) must report ${d.input.length}→${d.output.length} items, got ${row.nIn}→${row.nOut}`);
    });
    check(document.getElementById('rl-status').textContent.includes('Success'), 'the log status line must report Success');

    // 7. NDV — double-click opens n8n's Node Details View; edits persist.
    const dbl = (id) => {
      const rc = cardEl(id).getBoundingClientRect();
      host.dispatchEvent(new MouseEvent('dblclick', { clientX: rc.left + rc.width / 2, clientY: rc.top + rc.height / 2, bubbles: true, cancelable: true }));
    };
    const ndv = document.getElementById('ndv');
    dbl('login');
    check(!ndv.hidden, 'double-clicking a node must open the NDV');
    const methodSel = document.querySelector('#ndv-params select[data-param="method"]');
    const urlInp = document.querySelector('#ndv-params input[data-param="url"]');
    check(!!methodSel && !!urlInp, 'the HTTP node must render its Method + URL parameters form');
    check(methodSel.value === 'POST' && urlInp.value === 'https://pams.example/api/login',
      `the params form must show the node's stored parameters, got ${methodSel.value} ${urlInp.value}`);
    // input/output panes carry the LAST RUN's items
    check(document.getElementById('ndv-input').textContent.includes('"trigger"'), 'the NDV input pane must show the upstream items from the last run');
    check(document.getElementById('ndv-output').textContent.includes('"token"'), 'the NDV output pane must show the items this node produced');
    check(document.getElementById('ndv-in-count').textContent === '1 item', `the input pane must count its items, got "${document.getElementById('ndv-in-count').textContent}"`);
    // edit the URL, close with Escape, reopen → the edit persisted
    urlInp.value = 'https://pams.example/api/v2/login';
    urlInp.dispatchEvent(new Event('input'));
    window.dispatchEvent(new KeyboardEvent('keydown', { key: 'Escape', bubbles: true }));
    check(ndv.hidden, 'Escape must close the NDV');
    dbl('login');
    check(document.querySelector('#ndv-params input[data-param="url"]').value === 'https://pams.example/api/v2/login',
      'a param edit must PERSIST across close/reopen (in-page state, like n8n)');
    ctx.PARAMS.login.url = 'https://pams.example/api/login'; // restore
    // rename in the header → the canvas card updates live
    const nameInp = document.getElementById('ndv-name');
    nameInp.value = 'Login v2 (PAMS)';
    nameInp.dispatchEvent(new Event('input'));
    await ctx.tick();
    check(cardEl('login').querySelector('.n8n-title').textContent === 'Login v2 (PAMS)', 'renaming in the NDV must rename the card on the canvas');
    nameInp.value = 'Login to PAMS';
    nameInp.dispatchEvent(new Event('input'));
    ctx.closeNDV();
    // "Execute step": runs the workflow UP TO the opened node only.
    ctx.reset();
    ctx.openNDV('setToken');
    document.getElementById('ndv-exec').click();
    await until(() => !ctx.runActive && RS.executed.length > 0, 'Execute step to finish');
    check(JSON.stringify(RS.executed) === JSON.stringify(['start', 'login', 'setToken']),
      `Execute step must run ancestors + the node ONLY, got ${JSON.stringify(RS.executed)}`);
    check(RS.status.get('setToken') === 'completed' && (RS.status.get('getBranches') ?? 'idle') === 'idle',
      'Execute step must leave everything downstream untouched');
    check(document.getElementById('ndv-output').textContent.includes('authorization'), 'after Execute step the NDV output pane must fill');
    ctx.closeNDV();
    // the "no input yet" hint + "Execute previous nodes" (n8n's affordance)
    ctx.reset();
    ctx.openNDV('merge');
    const hintBox = document.getElementById('ndv-input');
    check(/No input data yet/.test(hintBox.textContent), `an unexecuted node must hint about missing input, got "${hintBox.textContent.slice(0, 60)}"`);
    const prevBtn = hintBox.querySelector('button');
    check(!!prevBtn && /Execute previous/.test(prevBtn.textContent), 'the hint must offer "Execute previous nodes"');
    prevBtn.click();
    await until(() => !ctx.runActive && RS.executed.length > 0, 'Execute previous nodes to finish');
    check(RS.executed.includes('getVendors') && !RS.executed.includes('merge'),
      `"Execute previous nodes" must stop SHORT of the node itself, got ${JSON.stringify(RS.executed)}`);
    check(document.getElementById('ndv-in-count').textContent === '7 items', 'the input pane must now show the 7 upstream items');
    ctx.closeNDV();

    // 8. PAUSE freezes a live run; step ▸ advances exactly one node; continue finishes.
    const pauseBtn = document.getElementById('btn-pause');
    const stepBtn = document.getElementById('btn-step');
    check(pauseBtn.disabled, 'the pause button must be disarmed while no run is active');
    const pr = ctx.execute({ stepMs: 380 });
    try {
      await until(() => RS.executed.length >= 1, 'the run to pass its first node');
      check(!pauseBtn.disabled, 'the pause button must arm while a run is active');
      pauseBtn.click();
      check(ctx.paused === true, 'clicking pause must pause the run');
      check(pauseBtn.textContent === '▶ continue', `the pause button must flip to continue, got "${pauseBtn.textContent}"`);
      await sleep(280);
      const held = RS.running;
      const doneBefore = RS.executed.length;
      check([...RS.status.values()].filter((s) => s === 'running').length === 1, 'a paused run must hold exactly one running node');
      await sleep(300);
      check(RS.executed.length === doneBefore, 'NO node may complete while the run is paused');
      check(RS.running === held, 'the paused run must hold the SAME node');
      check(document.getElementById('run-readout').textContent.includes('paused at'), 'the readout must announce the pause');
      stepBtn.click();
      await until(() => RS.executed.length === doneBefore + 1, 'step-while-paused to advance');
      check(ctx.paused === true, 'stepping must not unpause the run');
      await sleep(300);
      check(RS.executed.length === doneBefore + 1, 'step ▸ must advance EXACTLY one node');
      pauseBtn.click(); // ▶ continue
      check(ctx.paused === false, 'continue must unpause');
      const pres = await pr;
      check(pres.failed === null && !pres.aborted, 'the continued run must finish normally');
      check(pauseBtn.disabled && pauseBtn.textContent === '⏸ pause', 'the pause button must disarm after the run ends');
    } finally {
      ctx.reset();
      await pr.catch(() => {});
    }
    // step ▸ from idle starts a run BORN paused at the trigger (walk it node by node)
    stepBtn.click();
    await until(() => RS.running === 'start', 'idle step ▸ to hold the trigger running');
    check(ctx.paused === true, 'the idle-started step run must be born paused');
    document.getElementById('btn-reset').click();
    await until(() => !ctx.runActive, 'reset to abort the stepped run');
    check([...RS.status.values()].every((s) => s === 'idle') || RS.status.size === 0, 'reset must clear every status back to idle');

    // 9. IF BRANCHING — items drive the branch; it alternates with the data,
    //    and flipping the operation IN THE NDV flips the routing.
    const ra = await ctx.execute({ stepMs: 0 });
    const ta = ra.executed[ra.executed.length - 1];
    const allDoneA = RS.data.get('agent').output[0].allDone;
    check(ta === (allDoneA ? 'excel' : 'wait'), `the branch must follow the condition on the ITEMS (allDone=${allDoneA} → ${ta})`);
    check((RS.status.get(ta === 'excel' ? 'wait' : 'excel') ?? 'idle') === 'idle', 'the untaken branch stays idle');
    const rb = await ctx.execute({ stepMs: 0 });
    const tb = rb.executed[rb.executed.length - 1];
    check(ta !== tb, `the simulated data alternates run-to-run, so consecutive runs must take DIFFERENT branches (got ${ta} then ${tb})`);
    ctx.openNDV('ifNode');
    const opSel = document.querySelector('#ndv-params select[data-param="operation"]');
    check(!!opSel, 'the If node must render its condition operation select');
    opSel.value = 'is false';
    opSel.dispatchEvent(new Event('change'));
    ctx.closeNDV();
    const rf2 = await ctx.execute({ stepMs: 0 });
    const allDoneC = RS.data.get('agent').output[0].allDone;
    const tc = rf2.executed[rf2.executed.length - 1];
    check(tc === (allDoneC ? 'wait' : 'excel'), `flipping the If operation in the NDV must flip the routing (allDone=${allDoneC}, op="is false" → ${tc})`);
    ctx.PARAMS.ifNode.operation = 'is true'; // restore

    // 10. FAILURE halts the run n8n-style; Settings can retry or continue.
    failBtn.click();
    check(failBtn.getAttribute('aria-pressed') === 'true', 'the fail toggle must arm visibly');
    const rerr = await ctx.execute({ stepMs: 0 });
    check(rerr.failed === 'getVendors', `the armed failure must halt at Get Vendors, got ${rerr.failed}`);
    check(RS.status.get('getVendors') === 'error', 'the failing node must hold status error');
    check(cardEl('getVendors').classList.contains('st-error'), 'the failing node must paint st-error');
    check(!!host.querySelector('[data-node-id="getVendors"] .n8n-status.err'), 'the failing node must carry the red ! badge');
    for (const id of ['merge', 'store', 'agent', 'ifNode', 'excel', 'wait']) {
      check((RS.status.get(id) ?? 'idle') === 'idle', `${id} is downstream of the failure and must never run, is ${RS.status.get(id)}`);
    }
    check(document.getElementById('rl-status').textContent.includes('Error'), 'the log status line must report the error');
    // Continue on fail (NDV Settings tab, driven through the real UI):
    ctx.openNDV('getVendors');
    document.querySelector('.ndv-tab[data-tab="settings"]').click();
    const cof = document.querySelector('#ndv-settings input[data-set="continueOnFail"]');
    check(!!cof, 'the Settings tab must render the continue-on-fail toggle');
    cof.click();
    check(ctx.SETTINGS.getVendors.continueOnFail === true, 'the Settings toggle must persist into the node settings');
    ctx.closeNDV();
    const rcont = await ctx.execute({ stepMs: 0 });
    check(rcont.failed === null, 'with continue-on-fail the run must NOT halt');
    check(RS.status.get('getVendors') === 'error', 'the failing node still reports its error');
    check(RS.status.get('merge') === 'completed', 'downstream must run on the error item');
    check(RS.data.get('merge').output.length === 5, `Merge must see 4 branches + 1 error item, got ${RS.data.get('merge').output.length}`);
    // Retry on fail recovers:
    ctx.SETTINGS.getVendors.continueOnFail = false;
    ctx.SETTINGS.getVendors.retryOnFail = true;
    const rretry = await ctx.execute({ stepMs: 0 });
    check(rretry.failed === null && RS.status.get('getVendors') === 'completed', 'retry-on-fail must recover the node');
    check(RS.log.some((row) => row.note.includes('retried')), 'the log must note the retry');
    failBtn.click(); // disarm
    ctx.SETTINGS.getVendors.retryOnFail = false;

    // 11. MUTATION PROOF (execution) — the pill/data consistency check has
    //     teeth: forge one pill and it goes red; repaint from run data, green.
    const rg = await ctx.execute({ stepMs: 0 });
    check(rg.failed === null, 'mutation baseline run must be green');
    api.fitView(50); api.renderNow(); await ctx.tick();
    const pillsConsistent = () => {
      for (const id of RS.executed) {
        const d = RS.data.get(id);
        const b = RS.branchOut.get(id);
        for (const l of model.getLinks()) {
          if (!/^(e_|if_)/.test(l.id) || model.getNodeByPortId(l.sourcePortId)?.id !== id) continue;
          const n = b ? (b[l.sourcePortId] ?? []).length : d.output.length;
          if (n === 0) continue;
          if (!linkText(l.id).includes(`${n} item`)) return false;
        }
      }
      return true;
    };
    check(pillsConsistent(), 'baseline: every traversed wire pill must match the items that flowed');
    ctx.setWirePill(model.getLink('e_merge_store'), '99 items');
    api.renderNow(); await ctx.tick();
    check(!pillsConsistent(), 'MUTATION: with the merge→store pill forged to "99 items" the pill/data consistency check must go RED — it has teeth');
    ctx.pillsFrom('merge');
    api.renderNow(); await ctx.tick();
    check(pillsConsistent(), 'restore: repainting from the run data heals the pill');
    // 11b. MUTATION PROOF (legibility) — the opaque-chip check has teeth too:
    // strip one pill's background and it goes red; repaint heals it.
    const mlk = model.getLink('e_merge_store');
    const mIdx = mlk.labels.findIndex((x) => x.id === 'wire-pill');
    check(mIdx !== -1, 'the merge→store wire must carry its positioned pill label');
    mlk.updateLabel(mIdx, { style: { ...mlk.labels[mIdx].style, background: 'none' } });
    api.renderNow(); await ctx.tick();
    check(!pillChip('e_merge_store'), 'MUTATION: with its background stripped the pill is no longer an opaque chip — the chip check has teeth');
    ctx.pillsFrom('merge');
    api.renderNow(); await ctx.tick();
    check(pillChip('e_merge_store'), 'restore: repainting the pill restores its opaque chip');

    // 12. The palette BUILDS: clicking a chip drops a fresh, registered node.
    const n0 = model.getNodes().length;
    await ctx.addNode('code');
    check(model.getNodes().length === n0 + 1, `clicking a palette chip should add a node (${n0}→${model.getNodes().length})`);
    check(!!host.querySelector('.n8n-card.cat-code'), 'the palette-added Code node should paint its card');

    // Leave the page framed the way a visitor first meets it.
    ctx.reset();
    ctx.closeNDV();
    ctx.setLogsOpen(false);
    ctx.initialFrame();
  },
});
</script>
