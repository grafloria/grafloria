<meta charset="utf-8">
<title>Table / ER diagram — Grafloria</title>
<link rel="stylesheet" href="../shell/demo.css">
<header id="demo-head"></header>
<div id="canvas"></div>
<script type="module">
import { render, erDiagram } from '../shell/grafloria.js';
import { defineDemo, check } from '../shell/demo.js';

// A database ER diagram in PURE DATA, via the reusable diagram kit
// (`erDiagram` from @grafloria/element). The kit owns the table-card look, the
// PK/FK badges, the crow's-foot cardinality markers, the selection styling and
// the routing discipline — this page just declares the schema. Compare with
// diagrams/er-advanced.html for multi-FK / self-reference / field-level joins.
const SPEC = erDiagram({
  entities: [
    // CUSTOMER / ORDER / LINE_ITEM are centre-aligned so their side-to-side
    // relationships run dead straight into the crow's-foot.
    { id: 'CUSTOMER', name: 'Customer', position: { x: 60, y: 76 }, columns: [
      { name: 'id', type: 'int', pk: true },
      { name: 'name', type: 'varchar' },
      { name: 'email', type: 'varchar' },
    ]},
    { id: 'ORDER', name: 'Order', position: { x: 400, y: 64 }, columns: [
      { name: 'id', type: 'int', pk: true },
      { name: 'customer_id', type: 'int', fk: true },
      { name: 'placed_at', type: 'date' },
      { name: 'total', type: 'decimal' },
    ]},
    { id: 'LINE_ITEM', name: 'Line Item', position: { x: 740, y: 64 }, columns: [
      { name: 'id', type: 'int', pk: true },
      { name: 'order_id', type: 'int', fk: true },
      { name: 'product_id', type: 'int', fk: true },
      { name: 'qty', type: 'int' },
    ]},
    { id: 'PRODUCT', name: 'Product', position: { x: 740, y: 380 }, columns: [
      { name: 'id', type: 'int', pk: true },
      { name: 'sku', type: 'varchar' },
      { name: 'price', type: 'decimal' },
    ]},
  ],
  relationships: [
    { from: 'CUSTOMER', to: 'ORDER', label: 'places' },
    { from: 'ORDER', to: 'LINE_ITEM', label: 'contains' },
    { from: 'PRODUCT', to: 'LINE_ITEM', label: 'appears in', fromSide: 'top', toSide: 'bottom' },
  ],
});

defineDemo({
  name: 'Table / ER diagram',
  blurb: 'A database entity-relationship diagram from PURE DATA via the reusable erDiagram() kit: HTML "table" nodes with typed columns and PK/FK badges, joined by crow\'s-foot cardinality — the look, selection and routing all come from the kit.',
  howTo: [
    'Read a table: a dark header names the entity, each row is a column with its type and a PK (primary key) or FK (foreign key) badge — real HTML inside the node, all generated by the kit.',
    'Follow a relationship: the line from CUSTOMER to ORDER ends in a crow\'s-foot (many) and starts with a single bar (one) — "one customer places many orders". The edge label names the relation.',
    'Drag a table around: the columns ride inside the node and the relationship lines re-route to follow it. Click a table: the CARD highlights with a ring (no detached rectangle).',
    'Click a COLUMN row: it highlights (blue bar) and the kit fires an axk:row-select event with { nodeId, rowIndex, name } — the seam a host app drives a properties panel from. Click it again, or another row, to move the selection.',
    'Read the source of this page: the whole diagram is one erDiagram({ entities, relationships }) call — no CSS, no HTML trees, no arrow config. That is the reusable kit.',
  ],
  reactflow: 'Entity Relationship',
  pro: true,

  async setup(ctx) {
    const api = render(SPEC, ctx.host);
    ctx.instance = api;
    ctx.diagram = api.getModel();
    api.fitView?.(40);
    await ctx.tick();
  },

  async assert(ctx) {
    const host = ctx.host;
    // 1. Entities render as kit table cards with headers + column rows.
    const cust = host.querySelector('[data-node-id="CUSTOMER"] foreignObject');
    check(!!cust, 'CUSTOMER entity did not render as an HTML node');
    check((cust.textContent || '').includes('email'), 'the Customer table should list its columns (email)');
    const heads = [...host.querySelectorAll('.axk-entity-head')].map((e) => e.textContent);
    check(heads.length === 4, `expected 4 entity headers, got ${heads.length}: [${heads}]`);

    // 2. PK/FK badges are present.
    const badges = [...host.querySelectorAll('.axk-entity .axk-key')].map((e) => e.textContent).filter(Boolean);
    check(badges.includes('PK') && badges.includes('FK'), `expected PK and FK badges, got [${[...new Set(badges)]}]`);

    // 3. Relationships render with painted cardinality markers.
    const model = ctx.diagram;
    check(model.getLinks().length === 3, `expected 3 relationships, got ${model.getLinks().length}`);
    check(host.querySelectorAll('.arrow-crow-foot').length === 3, `expected 3 painted crow's-foot markers`);
    check(host.querySelectorAll('.arrow-one').length === 3, 'each relationship should paint a "one" bar on its tail');

    // 4. The kit injected its stylesheet exactly once.
    check(document.querySelectorAll('#grafloria-diagram-kit-styles').length === 1, 'the kit stylesheet should be injected once');

    // 5. ROW SELECTION (P1): render() auto-ran the kit's finalize, so a real
    //    click on a column selects THAT row and fires axk:row-select — with the
    //    table still draggable (the card is interactive, node hit stays geometric).
    const events = [];
    host.addEventListener('axk:row-select', (e) => events.push(e.detail));
    const emailRow = [...host.querySelectorAll('[data-node-id="CUSTOMER"] .axk-row')]
      .find((r) => (r.textContent || '').includes('email'));
    check(!!emailRow, 'could not find the Customer.email row');
    emailRow.dispatchEvent(new MouseEvent('click', { bubbles: true }));
    check(emailRow.classList.contains('axk-row-selected'), 'clicking a column row must select it');
    check(host.querySelectorAll('.axk-row-selected').length === 1, 'exactly one row is selected at a time');
    check(events.at(-1)?.selected?.name === 'email' && events.at(-1)?.selected?.nodeId === 'CUSTOMER',
      `axk:row-select must carry {nodeId, name} (got ${JSON.stringify(events.at(-1)?.selected)})`);
    // Re-clicking deselects — leaves a clean frame for the visual gate.
    emailRow.dispatchEvent(new MouseEvent('click', { bubbles: true }));
    check(host.querySelectorAll('.axk-row-selected').length === 0, 're-clicking the selected row deselects it');
    ctx.instance.getModel().clearSelection?.();
    await ctx.tick();
  },
});
</script>
