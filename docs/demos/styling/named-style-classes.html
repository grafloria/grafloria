<meta charset="utf-8">
<title>Named style classes — Grafloria</title>
<link rel="stylesheet" href="../shell/demo.css?v=drawer3">
<style>
  .note { font-size: 12px; opacity: .8; padding: 10px 24px; border-bottom: 1px solid rgba(127,127,127,.25); line-height: 1.6; }
  code { background: rgba(127,127,127,.15); padding: 1px 5px; border-radius: 4px; }
  #canvas { height: calc(100vh - 210px); }
  .cascade { font-family: ui-monospace, Menlo, monospace; }
</style>
<header id="demo-head"></header>
<div class="note">
  One cascade, five layers, lowest to highest:
  <span class="cascade">theme &lt; type-default &lt; <b>named-class</b> &lt; element-inline &lt; state</b></span>.
  A node names a class with <code>style.styleClass: 'warn'</code>; a later layer always
  overrides an earlier one — element-inline beats the class, and <b>state</b> (selection)
  beats everything.
</div>
<div id="canvas"></div>
<script type="module">
import { render, defineStyle, getStyle, resolveNodeStyle, listStyles, CASCADE_ORDER, LIGHT_THEME } from '../shell/grafloria.js';
import { defineDemo, check, checkChanged } from '../shell/demo.js?v=drawer3';

// The registry is a process-wide singleton, so namespace class names to this demo.
const WARN = 'nsc-warn';
const BOLD = 'nsc-bold';

defineStyle(WARN, { fill: '#f97316', stroke: '#9a3412', strokeWidth: 2 });
defineStyle(BOLD, { strokeWidth: 6 });   // stacks with WARN; last name wins on conflicts

const SPEC = {
  nodes: [
    // a) picks up the named class, nothing else.
    { id: 'classed',  position: { x: 60,  y: 90 },  size: { width: 190, height: 78 }, data: { label: 'styleClass: warn' },
      style: { styleClass: WARN } },
    // b) same class, but an ELEMENT-INLINE fill must override the class's fill.
    { id: 'override', position: { x: 320, y: 90 },  size: { width: 190, height: 78 }, data: { label: 'warn + inline fill' },
      style: { styleClass: WARN, fill: '#22c55e' } },
    // c) two classes; the later name (bold) wins the strokeWidth conflict.
    { id: 'stacked',  position: { x: 580, y: 90 },  size: { width: 190, height: 78 }, data: { label: 'warn bold' },
      style: { styleClass: `${WARN} ${BOLD}` } },
    // d) the control: no class at all — stays on the theme default.
    { id: 'plain',    position: { x: 320, y: 250 }, size: { width: 190, height: 78 }, data: { label: 'no class (theme)' } },
  ],
  edges: [],
};

const rectOf = (host, id) => host.querySelector(`[data-node-id="${id}"] rect.diagram-node`);
const fillOf = (host, id) => getComputedStyle(rectOf(host, id)).fill;
const strokeWidthOf = (host, id) => parseFloat(getComputedStyle(rectOf(host, id)).strokeWidth);

defineDemo({
  name: 'Named style classes',
  blurb: 'defineStyle() + style.styleClass — one deterministic cascade: theme < type-default < named-class < element-inline < state.',
  howTo: [
    'Compare "styleClass: warn" (orange — the named class) with "no class (theme)": the class layer overrides the theme default.',
    'Look at "warn + inline fill" — it is GREEN: the element\'s own inline fill outranks the class it also names.',
    'Compare borders: "warn bold" stacks two classes and the later name wins the conflict — a 6px stroke against warn\'s 2px.',
    'Click the orange node: the selection highlight repaints it — STATE tops the cascade, so a named class can never suppress it.',
  ],
  reactflow: null,

  async setup(ctx) {
    const api = render(SPEC, ctx.host);
    ctx.instance = api;
    ctx.diagram = api.getModel();
    api.renderNow();
    await ctx.tick();
  },

  async assert(ctx) {
    const host = ctx.host;

    // 0. The cascade order is the documented one, and named-class sits between
    //    the type default and the element's own inline style.
    check(
      JSON.stringify(CASCADE_ORDER) === JSON.stringify(['theme','type-default','named-class','element-inline','state']),
      `CASCADE_ORDER is not the documented cascade: ${JSON.stringify(CASCADE_ORDER)}`
    );
    check(listStyles().includes(WARN), `defineStyle('${WARN}') did not register: ${JSON.stringify(listStyles())}`);
    check(getStyle(WARN).fill === '#f97316', 'the registered warn style lost its fill');

    // 1. A node that names the class paints the class's fill — proven against the
    //    theme control, which must differ.
    const classed = fillOf(host, 'classed');
    const plain = fillOf(host, 'plain');
    check(classed === 'rgb(249, 115, 22)', `styleClass 'warn' should paint #f97316, got ${classed}`);
    checkChanged(classed, plain, 'a named class painted the same as the bare theme default — the class did nothing');

    // 2. THE CASCADE, LAYER BY LAYER. Element-inline OUTRANKS the named class:
    //    node (b) has the class (orange) AND an inline green fill. Green must win.
    const overridden = fillOf(host, 'override');
    check(
      overridden === 'rgb(34, 197, 94)',
      `element-inline fill (#22c55e) must beat the named class's fill; got ${overridden}.\n` +
      `    If this is orange, the cascade applied named-class ABOVE element-inline — wrong order.`
    );

    // 3. TWO classes stack, and the LATER name wins a conflict: 'warn'(2) then
    //    'bold'(6) → 6px, not 2px.
    const stackedW = strokeWidthOf(host, 'stacked');
    check(stackedW === 6, `stacked 'warn bold' should take bold's 6px strokeWidth, got ${stackedW}`);
    const classedW = strokeWidthOf(host, 'classed');
    check(classedW === 2, `'warn' alone should be 2px, got ${classedW}`);

    // 4. STATE beats everything. Select the classed node: the selection state
    //    layer must repaint it away from the class colour.
    const model = ctx.diagram;
    model.getNode('classed').setSelected(true);
    ctx.instance.renderNow();
    await ctx.tick();
    const selectedFill = fillOf(host, 'classed');
    checkChanged(
      classed, selectedFill,
      "selecting the node did not change its paint — the STATE layer (top of the cascade) was ignored.\n" +
      "    A named class must NOT be able to suppress the selection highlight."
    );
    model.getNode('classed').setSelected(false);
    ctx.instance.renderNow();

    // 5. resolveNodeStyle() — the cascade computed directly — agrees with the DOM.
    const resolved = resolveNodeStyle(model.getNode('stacked'), LIGHT_THEME);
    check(resolved.strokeWidth === 6, `resolveNodeStyle disagrees with the painted DOM: ${resolved.strokeWidth} vs 6`);
    check(resolved.fill === '#f97316', `resolveNodeStyle should carry warn's fill through the cascade, got ${resolved.fill}`);
  },
});
</script>
