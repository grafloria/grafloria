<meta charset="utf-8">
<title>Context menu — Grafloria</title>
<link rel="stylesheet" href="../shell/demo.css">
<style>
  #canvas { height: calc(100vh - 120px); position: relative; }
  #menu { position: absolute; z-index: 10; min-width: 160px; background: var(--mbg,#fff); color: inherit; border: 1px solid rgba(127,127,127,.35); border-radius: 8px; box-shadow: 0 8px 30px rgba(0,0,0,.18); padding: 4px; display: none; font: 13px system-ui, sans-serif; }
  #menu.open { display: block; }
  #menu button { display: block; width: 100%; text-align: left; padding: 7px 10px; border: 0; background: transparent; color: inherit; border-radius: 5px; cursor: pointer; }
  #menu button:hover { background: rgba(127,127,127,.15); }
  @media (prefers-color-scheme: dark){ #menu{ --mbg:#1a1a1a; } }
</style>
<header id="demo-head"></header>
<div id="canvas">
  <div id="menu">
    <button data-act="rename">Rename</button>
    <button data-act="duplicate">Duplicate</button>
    <button data-act="delete">Delete</button>
  </div>
</div>
<script type="module">
import { render } from '../shell/grafloria.js';
import { defineDemo, check } from '../shell/demo.js';

// Right-click a node → a menu opens ANCHORED to that node, and its actions mutate
// the RIGHT node. We drive a real `contextmenu` event at a node's DOM element and
// assert (a) the menu opened for that node, and (b) each action actually changed the
// model — a menu whose items do nothing is the commonest fake in this category.
defineDemo({
  name: 'Context menu',
  blurb: 'Right-click a node for Rename / Duplicate / Delete — driven by a real contextmenu event, and every item actually mutates the model it names.',
  reactflow: 'Context Menu',

  async setup(ctx) {
    const api = render({
      nodes: [
        { id: 'a', position: { x: 120, y: 120 }, size: { width: 120, height: 48 }, label: 'Alpha' },
        { id: 'b', position: { x: 380, y: 120 }, size: { width: 120, height: 48 }, label: 'Beta' },
      ],
      edges: [{ id: 'e', source: 'a', target: 'b' }],
    }, ctx.host);
    ctx.instance = api;
    ctx.diagram = api.getModel();
    ctx.engine = api.getEngine();

    const menu = document.getElementById('menu');
    ctx.menu = menu;
    ctx.menuTarget = null;

    // Open the menu at the pointer for whichever node was right-clicked.
    ctx.host.addEventListener('contextmenu', (e) => {
      const el = e.target.closest('[data-node-id]');
      if (!el) return;
      e.preventDefault();
      ctx.menuTarget = el.getAttribute('data-node-id');
      const rect = ctx.host.getBoundingClientRect();
      menu.style.left = `${e.clientX - rect.left}px`;
      menu.style.top = `${e.clientY - rect.top}px`;
      menu.classList.add('open');
    });

    // The actions. Each one is a real model mutation on ctx.menuTarget.
    ctx.act = async (action) => {
      const id = ctx.menuTarget;
      if (action === 'rename') ctx.diagram.getNode(id).setMetadata('label', 'RENAMED');
      if (action === 'delete') ctx.diagram.removeNode(id);
      if (action === 'duplicate') {
        const src = ctx.diagram.getNode(id);
        const copy = await ctx.engine.addNode({ type: 'rect', position: { x: src.position.x + 30, y: src.position.y + 60 }, size: { ...src.size } });
        copy.setMetadata('label', (src.getMetadata('label') ?? '') + ' copy');
      }
      menu.classList.remove('open');
      api.renderNow();
    };
    for (const btn of menu.querySelectorAll('button')) {
      btn.addEventListener('click', () => ctx.act(btn.dataset.act));
    }
  },

  async assert(ctx) {
    const model = ctx.diagram;

    // Helper: fire a real right-click at a node's DOM box centre.
    const rightClick = (id) => {
      const el = ctx.host.querySelector(`[data-node-id="${id}"]`);
      check(!!el, `node ${id} is not in the DOM to right-click`);
      const r = el.getBoundingClientRect();
      el.dispatchEvent(new MouseEvent('contextmenu', {
        bubbles: true, cancelable: true, clientX: r.left + r.width / 2, clientY: r.top + r.height / 2,
      }));
    };

    // 1. Right-click node A → menu opens, targeting A.
    rightClick('a');
    check(ctx.menu.classList.contains('open'), 'context menu did not open on right-click');
    check(ctx.menuTarget === 'a', `menu targeted ${ctx.menuTarget}, not the node that was right-clicked`);

    // 2. RENAME acts on A (and NOT on B).
    const bLabelBefore = model.getNode('b').getMetadata('label');
    await ctx.act('rename');
    check(model.getNode('a').getMetadata('label') === 'RENAMED', 'Rename did not change A\'s label');
    check(model.getNode('b').getMetadata('label') === bLabelBefore, 'Rename wrongly touched node B');

    // 3. DUPLICATE on B adds exactly one node.
    const before = model.getNodes().length;
    rightClick('b');
    check(ctx.menuTarget === 'b', 'right-clicking B did not retarget the menu');
    await ctx.act('duplicate');
    check(model.getNodes().length === before + 1, `Duplicate did not add a node (had ${before}, now ${model.getNodes().length})`);

    // 4. DELETE on A removes it.
    rightClick('a');
    await ctx.act('delete');
    check(!model.getNode('a'), 'Delete did not remove node A');
    check(!ctx.menu.classList.contains('open'), 'menu stayed open after an action');
  },
});
</script>
